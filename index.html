<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#faf6f1">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Übezeit&quot;,&quot;short_name&quot;:&quot;Übezeit&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23faf6f1&quot;,&quot;theme_color&quot;:&quot;%23faf6f1&quot;}">
<title>Übezeit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf6f1;--surface:#fff;--surface2:#f0ebe4;--border:#e0d6ca;--text:#2c241c;--muted:#8a7e72;--accent:#c8703c;--accent2:#2a9d8f;--accent3:#a4546e;--accent4:#b07d3a;--danger:#c0392b;--success:#27ae60;--nav-h:56px;--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;overflow-y:scroll;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px)}
.app{max-width:480px;margin:0 auto;min-height:100dvh;padding:16px 16px 20px}
h1{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);letter-spacing:-.5px}
.sub{color:var(--muted);font-size:11px;margin-top:2px}
.hdr{display:flex;justify-content:space-between;align-items:flex-end}

/* Fixed bottom nav */
.nav{display:flex;gap:0;margin:0;background:var(--surface);border-radius:0;padding:4px 8px calc(4px + var(--safe-b));position:fixed;bottom:0;left:0;right:0;z-index:100;border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nav button{flex:1;padding:10px 4px 6px;border:none;background:none;color:var(--muted);font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;transition:.2s;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.nav button.on{color:var(--accent)}
.nav-icon{font-size:18px;line-height:1}

/* Cards & layout */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.row{display:flex;gap:8px;align-items:center}
.col{display:flex;flex-direction:column;gap:6px}
.flex1{flex:1;min-width:0}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mt8{margin-top:8px}.mt12{margin-top:12px}

/* Buttons – min 44px touch target */
.btn{padding:14px 16px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;width:100%;text-align:center;min-height:44px;-webkit-appearance:none}
.btn-p{background:var(--accent);color:var(--bg)}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-go{background:var(--accent2);color:#fff}
.btn-stop{background:var(--danger);color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;min-height:36px}
.btn-xs{padding:6px 12px;font-size:11px;width:auto;min-height:32px}
.btn:active{transform:scale(.97);opacity:.9}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center}
.stat b{font-family:'DM Serif Display',serif;font-size:24px;color:var(--accent);display:block}
.stat span{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* Week progress */
.week-bar{width:100%;height:32px;background:var(--surface2);border-radius:16px;overflow:hidden;margin:8px 0;position:relative}
.week-fill{height:100%;border-radius:16px;transition:width .4s;min-width:2px}
.week-pct{position:absolute;top:0;left:0;right:0;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text)}
.week-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}

/* Pieces */
.piece{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;-webkit-touch-callout:none}
.piece:active{background:var(--border);border-color:var(--accent)}
.piece-name{font-weight:600;font-size:14px}
.piece-cat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.piece-bpm{font-size:12px;color:var(--accent2);font-weight:600}
.piece-bar{width:100%;height:4px;background:var(--surface2);border-radius:2px;margin-top:5px;overflow:hidden}
.piece-fill{height:100%;border-radius:2px}
.piece-bar-done{background:var(--success)}
.piece-spark{display:block;margin-top:4px}
.piece-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px}

/* Practice view */
.practice-piece{text-align:center;padding:16px 0}
.practice-name{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px}
.practice-cat{font-size:12px;color:var(--muted);margin-bottom:8px}
.timer-big{font-family:'DM Serif Display',serif;font-size:56px;color:var(--text);line-height:1;margin-top:4px}
.tempo-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin:10px 0;text-align:center}
.tempo-val{font-family:'DM Serif Display',serif;font-size:40px;color:var(--accent2)}
.tempo-label{font-size:11px;color:var(--muted)}
.tempo-target{font-size:12px;color:var(--muted);margin-top:4px}
.tempo-btns{display:flex;gap:8px;justify-content:center;margin-top:10px;align-items:center}
.tempo-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.tempo-btn:active{background:var(--border);transform:scale(.95)}
.tempo-set{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.rounds{margin-top:10px;text-align:left}
.round-item{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)}
.round-item:last-child{border:none}
.round-bpm{color:var(--accent2);font-weight:600}
.round-time{color:var(--muted)}
.piece-picker{max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Edit */
input[type=text],input[type=number],select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:16px;width:100%;-webkit-appearance:none;min-height:44px}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.rm-btn{width:36px;height:36px;border-radius:8px;border:none;background:var(--surface);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;min-height:36px}
.rm-btn:active{color:var(--danger);background:var(--border)}
.add-btn{font-size:12px;color:var(--accent2);background:none;border:1px dashed var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-family:inherit;min-height:36px}
.add-btn:active{border-color:var(--accent2)}
.edit-item{margin-bottom:10px;padding:12px;background:var(--surface2);border-radius:10px}

/* Metronome */
.metro{text-align:center}
.bpm-big{font-family:'DM Serif Display',serif;font-size:52px;color:var(--accent2);line-height:1}
.bpm-lbl{font-size:12px;color:var(--muted)}
.dots{display:flex;gap:12px;justify-content:center;margin:16px 0}
.dot{width:20px;height:20px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);transition:.08s}
.dot.on{background:var(--accent2);border-color:var(--accent2);transform:scale(1.3)}
.metro-ctrl{display:flex;align-items:center;gap:12px;justify-content:center}
.m-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.m-btn:active{background:var(--border);transform:scale(.95)}
.presets{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}

/* Log */
.log-entry{padding:10px 12px;background:var(--surface2);border-radius:10px;margin-bottom:6px}
.log-hdr{display:flex;justify-content:space-between;align-items:center}
.log-date{font-size:12px;color:var(--muted)}
.log-dur{font-weight:700;color:var(--accent);font-size:13px}
.log-rounds{margin-top:6px}
.log-rnd{font-size:11px;display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)}
.log-rnd:last-child{border:none}
.log-rnd-bpm{color:var(--accent2);font-weight:600}

.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.stitle{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:600}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.shdr .stitle{margin:0}
.view{display:none}.view.on{display:block;animation:fi .3s ease;margin-top:12px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px}
.pat-name{font-weight:600;color:var(--accent4);font-size:13px}
.pat-str{font-family:monospace;color:var(--text);font-size:14px;margin:4px 0;letter-spacing:2px}
.pat-desc{font-size:11px;color:var(--muted)}
.detail-chart{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 12px 10px;margin-bottom:12px}
.detail-chart svg{display:block;width:100%}
.detail-sessions .ds-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.detail-sessions .ds-item:last-child{border:none}
.ds-date{color:var(--muted)}
.ds-bpm{color:var(--accent2);font-weight:600}
.ds-rounds{color:var(--muted);font-size:11px;margin-top:2px}
.rating-screen{text-align:center;padding:20px 0}
.rating-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
.rating-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.rating-row{margin-bottom:16px}
.rating-label{font-size:13px;font-weight:600;margin-bottom:6px}
.stars{display:flex;gap:4px;justify-content:center}
.star{width:44px;height:44px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.star.on{border-color:var(--accent4);background:var(--accent4);color:#fff}
.star:active{transform:scale(.92)}
.rating-summary{font-size:12px;color:var(--muted);margin-top:4px}
.rating-stars-inline{color:var(--accent4);font-size:11px;letter-spacing:1px}
.reward-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;text-align:center}
.reward-tier{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
.reward-text{font-size:14px;font-weight:600;color:var(--accent);margin:6px 0}
.reward-conditions{font-size:11px;color:var(--muted);margin-top:8px}
.reward-cond-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.reward-cond-check{color:var(--success);font-weight:700}
.reward-cond-miss{color:var(--border)}
.reward-progress{width:100%;height:6px;background:var(--surface2);border-radius:3px;margin-top:2px;overflow:hidden}
.reward-progress-fill{height:100%;border-radius:3px}
.celebration{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;animation:fi .3s ease}
.celebration-box{background:var(--surface);border-radius:20px;padding:30px;text-align:center;max-width:340px;margin:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.celebration-emoji{font-size:60px;margin-bottom:12px}
.celebration-title{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px}
.celebration-reward{font-size:16px;color:var(--accent);font-weight:600;margin:12px 0}
.celebration-sub{font-size:13px;color:var(--muted)}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.stat-card-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:10px}
.stat-chart{margin:8px 0}
.stat-chart svg{display:block;width:100%}
.attention-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:6px}
.attention-name{font-weight:600;font-size:13px}
.attention-reason{font-size:11px;color:var(--muted)}
.attention-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.week-compare-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.week-compare-row:last-child{border:none}
.week-compare-label{color:var(--muted)}
.week-compare-val{font-weight:600}
.legend-row{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <div class="hdr"><div><h1>🎸 Übezeit</h1><div class="sub">Akustik · Fingerpicking</div></div><div id="streak-box" style="display:none;text-align:right"><div id="streak-val" style="font-size:20px;color:var(--accent)"></div><div style="font-size:10px;color:var(--muted)">Tage Serie</div></div></div>
  <div class="nav">
    <button class="on" onclick="nav('home')"><span class="nav-icon">🎸</span>Üben</button>
    <button onclick="nav('pieces')"><span class="nav-icon">🎵</span>Stücke</button>
    <button onclick="nav('lesson')"><span class="nav-icon">🎓</span>Unterricht</button>
    <button onclick="nav('stats')"><span class="nav-icon">📈</span>Statistik</button>
    <button onclick="nav('log')"><span class="nav-icon">📊</span>Verlauf</button>
  </div>

  <!-- HOME -->
  <div class="view on" id="v-home"></div>

  <!-- PIECES -->
  <div class="view" id="v-pieces"></div>

  <!-- PRACTICE -->
  <div class="view" id="v-practice"></div>

  <!-- METRONOME -->
  <div class="view" id="v-metro"></div>

  <!-- LESSON -->
  <div class="view" id="v-lesson"></div>

  <!-- LOG -->
  <div class="view" id="v-log"></div>

  <!-- STATS -->
  <div class="view" id="v-stats"></div>

  <!-- SETTINGS -->
  <div class="view" id="v-settings"></div>
  <div class="view" id="v-detail"></div>
</div>
<script>
// Polyfill for older browsers
if(typeof structuredClone==='undefined'){window.structuredClone=function(o){return JSON.parse(JSON.stringify(o));};}
// === DATA ===
const DEF_CATS=["Aufwärmen","Fingerpicking","Song","Technik"];
let CATS=JSON.parse(localStorage.getItem("uz-cats"))||[...DEF_CATS];
const DEF_PIECES=[
  {id:1,name:"Dust in the Wind",cat:"Fingerpicking",note:"Kansas",links:[],sections:[{id:1,name:"Intro-Pattern",startBpm:60,targetBpm:104}]},
  {id:2,name:"Blackbird",cat:"Fingerpicking",note:"Beatles",links:[],sections:[{id:1,name:"Takte 1-8",startBpm:50,targetBpm:96}]},
  {id:3,name:"Hallelujah",cat:"Song",note:"Cohen",links:[],sections:[{id:1,name:"Fingerpicking-Version",startBpm:40,targetBpm:56}]},
  {id:4,name:"Tears in Heaven",cat:"Song",note:"Clapton",links:[],sections:[{id:1,name:"Refrain",startBpm:50,targetBpm:80}]},
  {id:5,name:"Chromatic Warm-Up",cat:"Aufwärmen",note:"",links:[],sections:[{id:1,name:"Alle 4 Finger",startBpm:60,targetBpm:120}]},
];
const PATTERNS=[
  {name:"Travis Picking",pat:"T 3 2 3 1 3 2 3",desc:"Daumen alterniert Bass"},
  {name:"Arpeggio",pat:"T 3 2 1 2 3",desc:"Klassisches Auf-Ab"},
  {name:"Dust in the Wind",pat:"T 3 2 1 2 1 2 3",desc:"Kansas-Style"},
  {name:"Blackbird",pat:"T+1 2 T+1 2",desc:"Daumen + Zeigefinger"},
];

// === STATE ===
let pieces=(JSON.parse(localStorage.getItem("uz-pieces"))||structuredClone(DEF_PIECES)).map(p=>{
  p.links=p.links||[];
  // Migrate old format: if no sections, create one from startBpm/targetBpm
  if(!p.sections||!p.sections.length){
    p.sections=[{id:1,name:p.note||'Ganzes Stück',startBpm:p.startBpm||0,targetBpm:p.targetBpm||0}];
  }
  return p;
});
let sessions=JSON.parse(localStorage.getItem("uz-sessions"))||[];
let tempoHist=JSON.parse(localStorage.getItem("uz-tempo"))||{}; // {pieceName:[{date,bpm},...]}
let settings=JSON.parse(localStorage.getItem("uz-settings"))||{weeklyMin:60,days:[1,2,3,4,5]};
// Rewards: user-defined reward text per tier, and which tiers are unlocked
let rewards=JSON.parse(localStorage.getItem("uz-rewards"))||{
  tiers:{
    bronze:{reward:"",unlocked:false,celebrated:false},
    silver:{reward:"",unlocked:false,celebrated:false},
    gold:{reward:"",unlocked:false,celebrated:false},
    diamond:{reward:"",unlocked:false,celebrated:false}
  }
};

// Lesson module
let lesson=JSON.parse(localStorage.getItem("uz-lesson"))||{
  nextDate:null, // ISO date string
  homework:[], // [{id,text,pieceName,sectionName,targetBpm,targetText}]
  questions:[], // [{id,text}]
  feedback:'' // Teacher feedback text
};

const MILESTONES={
  bronze:{label:"Bronze 🥉",streak:3,totalMin:420,piecesAtTarget:1,perfectExpr:1,perfReady:0,required:2,color:"#CD7F32"},
  silver:{label:"Silber 🥈",streak:7,totalMin:1680,piecesAtTarget:3,perfectExpr:2,perfReady:1,required:3,color:"#A0A0A0"},
  gold:{label:"Gold 🥇",streak:14,totalMin:4200,piecesAtTarget:5,perfectExpr:3,perfReady:2,required:4,color:"#DAA520"},
  diamond:{label:"Diamant 💎",streak:30,totalMin:8400,piecesAtTarget:8,perfectExpr:5,perfReady:3,required:5,color:"#B9F2FF"},
};
// Practice state
let practicing=false,practiceTimer=null,practicePieceId=null,practiceStart=null;
let practicePaused=false,pauseStart=null,totalPausedMs=0;
let currentTempo=80,roundStart=null,rounds=[];// [{bpm,seconds}]
let sessionLog=[];// [{pieceId,pieceName,rounds:[{bpm,seconds}],totalSec}]
let sessionStart=null;
// Metro
let audioCtx=null,metroBpm=80,metroOn=false,metroInt=null,metroBt=0;
let practiceElapsed=0;

function save(){localStorage.setItem("uz-pieces",JSON.stringify(pieces));localStorage.setItem("uz-sessions",JSON.stringify(sessions));localStorage.setItem("uz-tempo",JSON.stringify(tempoHist));localStorage.setItem("uz-settings",JSON.stringify(settings));localStorage.setItem("uz-cats",JSON.stringify(CATS));localStorage.setItem("uz-rewards",JSON.stringify(rewards));localStorage.setItem("uz-lesson",JSON.stringify(lesson));if(sessionLog.length)localStorage.setItem("uz-pending",JSON.stringify(sessionLog));else localStorage.removeItem("uz-pending");}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short"})+" · "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}
function fmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")}
function getMonday(d){var dt=new Date(d||new Date());var day=dt.getDay();var diff=day===0?6:day-1;dt.setDate(dt.getDate()-diff);dt.setHours(0,0,0,0);return dt;}
function getLast(n){const h=tempoHist[n]||[];return h.length?h[h.length-1].bpm:0}
function getHist(n){return tempoHist[n]||[]}
// Section-aware tempo key: "PieceName::SectionName"
function secKey(pName,sName){return pName+'::'+sName;}
function getSecLast(pName,sName){return getLast(secKey(pName,sName))||getLast(pName);}// fallback to old piece-level
function getSecHist(pName,sName){const h=getHist(secKey(pName,sName));return h.length?h:getHist(pName);}// fallback

// Check if piece is "auftrittssicher" (3x error-free in play mode consecutively)
function isPerformanceReady(pieceName){
  const recent=[];
  // Go through sessions newest first
  for(var i=sessions.length-1;i>=0;i--){
    var s=sessions[i];
    (s.pieces||[]).forEach(function(sp){
      if(sp.name===pieceName&&sp.mode==='spielen'&&sp.errorFree!=null){
        recent.push(sp.errorFree);
      }
    });
  }
  if(recent.length<3)return {ready:false,streak:0,total:recent.length};
  // Count consecutive error-free from most recent
  var streak=0;
  for(var j=0;j<recent.length;j++){
    if(recent[j])streak++;else break;
  }
  return {ready:streak>=3,streak:streak,total:recent.length};
}
function countPerformanceReady(){
  var count=0;
  pieces.forEach(function(p){if(isPerformanceReady(p.name).ready)count++;});
  return count;
}

function sparkline(name,target,w,h){
  const hist=getHist(name);if(hist.length<2)return'';
  const d=hist.slice(-12),bpms=d.map(x=>x.bpm),all=target?[...bpms,target]:bpms;
  const mn=Math.min(...all)-5,mx=Math.max(...all)+5,rng=mx-mn||1;
  const pts=bpms.map((v,i)=>`${(i/(bpms.length-1))*(w-4)+2},${h-2-((v-mn)/rng)*(h-4)}`);
  let s=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" class="piece-spark">`;
  if(target){const ty=h-2-((target-mn)/rng)*(h-4);s+=`<line x1="0" y1="${ty}" x2="${w}" y2="${ty}" stroke="var(--accent2)" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>`;}
  s+=`<polyline points="${pts.join(' ')}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  const lp=pts[pts.length-1].split(',');s+=`<circle cx="${lp[0]}" cy="${lp[1]}" r="2" fill="var(--accent)"/>`;
  return s+'</svg>';
}

const CAT_COLORS=["#c8703c","#2a9d8f","#a4546e","#b07d3a","#5b7fbf","#d4a574","#7c6f9c","#e8a87c"];
function buildCatBreakdown(weekStart){
  // Gather seconds per category this week
  const weekSessions=sessions.filter(s=>new Date(s.date)>=weekStart);
  const catSec={};
  weekSessions.forEach(s=>{
    (s.pieces||[]).forEach(sp=>{
      const p=pieces.find(x=>x.name===sp.name);
      const cat=p?p.cat:'Sonstiges';
      catSec[cat]=(catSec[cat]||0)+sp.totalSec;
    });
  });
  const entries=Object.entries(catSec).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return '';
  const totalSec=entries.reduce((a,e)=>a+e[1],0);
  const maxSec=entries[0][1];

  // Stacked bar
  const stackParts=entries.map((e,i)=>{
    const pct=Math.round(e[1]/totalSec*100);
    return `<div style="width:${pct}%;background:${CAT_COLORS[i%CAT_COLORS.length]};height:100%;min-width:2px" title="${e[0]}: ${Math.round(e[1]/60)} Min"></div>`;
  }).join('');

  // Detail rows
  const rows=entries.map((e,i)=>{
    const min=Math.round(e[1]/60);
    const pct=maxSec?Math.round(e[1]/maxSec*100):0;
    const col=CAT_COLORS[i%CAT_COLORS.length];
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:500">${esc(e[0])}</span><span style="color:var(--muted)">${min} Min</span></div>
        <div style="width:100%;height:4px;background:var(--surface2);border-radius:2px;margin-top:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${col};border-radius:2px"></div></div>
      </div>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="stitle">Zeit pro Kategorie (Woche)</div>
    <div style="width:100%;height:12px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:10px">${stackParts}</div>
    ${rows}
  </div>`;
}

// === REWARDS ===
function calcStreak(){
  if(!sessions.length)return 0;
  var t=new Date();
  var days=new Set(sessions.map(function(s){return new Date(s.date).toDateString();}));
  var d=new Date(t);
  var streak=0;
  // If today has no session yet, start counting from yesterday
  if(!days.has(d.toDateString())){d.setDate(d.getDate()-1);}
  for(var i=0;i<365;i++){
    if(days.has(d.toDateString()))streak++;
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function calcMilestoneProgress(){
  const totalMin=sessions.reduce((a,s)=>a+Math.round(s.totalSec/60),0);
  let streak=calcStreak();
  const piecesAtTarget=pieces.filter(p=>{
    const secs=p.sections||[];
    return secs.some(function(s){
      if(!s.targetBpm)return false;
      const last=getSecLast(p.name,s.name);
      return last>=s.targetBpm;
    });
  }).length;
  // Count pieces with 4 consecutive 5-star expression ratings
  let perfectExpr=0;
  pieces.forEach(p=>{
    const ratings=[];
    // Collect expression ratings chronologically (newest first in sessions)
    [...sessions].reverse().forEach(s=>{
      (s.pieces||[]).forEach(sp=>{
        if(sp.name===p.name&&sp.exprRating)ratings.push(sp.exprRating);
      });
    });
    // Check last 4
    if(ratings.length>=4&&ratings.slice(-4).every(r=>r===5))perfectExpr++;
  });
  return {totalMin,streak,piecesAtTarget,perfectExpr,perfReady:countPerformanceReady()};
}

function checkAndUnlockTiers(){
  const prog=calcMilestoneProgress();
  let newUnlock=null;
  for(const[key,ms]of Object.entries(MILESTONES)){
    const tier=rewards.tiers[key];
    if(!tier.unlocked){
      const met=(prog.streak>=ms.streak?1:0)+(prog.totalMin>=ms.totalMin?1:0)+(prog.piecesAtTarget>=ms.piecesAtTarget?1:0)+(prog.perfectExpr>=ms.perfectExpr?1:0)+(ms.perfReady>0&&prog.perfReady>=ms.perfReady?1:0);
      if(met>=ms.required){
        tier.unlocked=true;
        tier.celebrated=false;
        newUnlock=key;
        save();
      }
    }
  }
  return newUnlock;
}

function showCelebration(tierKey){
  const ms=MILESTONES[tierKey];
  const tier=rewards.tiers[tierKey];
  if(!ms)return;
  const rewardText=tier.reward||'(Noch keine Belohnung festgelegt – geh in die Einstellungen!)';
  const overlay=document.createElement('div');
  overlay.className='celebration';
  overlay.innerHTML=`<div class="celebration-box">
    <div class="celebration-emoji">🎉</div>
    <div class="celebration-title">${ms.label} freigeschaltet!</div>
    <div class="celebration-sub">Du hast es geschafft!</div>
    <div class="celebration-reward">🎁 ${esc(rewardText)}</div>
    <button class="btn btn-go mt12" onclick="this.closest('.celebration').remove()">Weiter üben!</button>
  </div>`;
  document.body.appendChild(overlay);
  tier.celebrated=true;
  save();
}

function buildRewardCard(){
  const prog=calcMilestoneProgress();
  const tierKeys=['bronze','silver','gold','diamond'];
  // Find next unlocked tier or show highest unlocked
  let nextKey=null,highestUnlocked=null;
  for(const key of tierKeys){
    if(rewards.tiers[key].unlocked)highestUnlocked=key;
    else if(!nextKey)nextKey=key;
  }
  
  if(!nextKey&&highestUnlocked){
    // All unlocked!
    const ms=MILESTONES[highestUnlocked];
    return `<div class="reward-card" style="border-color:${ms.color}">
      <div class="reward-tier">${ms.label}</div>
      <div style="font-size:13px;color:var(--success);font-weight:600">Alle Stufen freigeschaltet! 🏆</div>
      ${rewards.tiers[highestUnlocked].reward?`<div class="reward-text">🎁 ${esc(rewards.tiers[highestUnlocked].reward)}</div>`:''}
    </div>`;
  }

  if(!nextKey)nextKey='bronze';
  const ms=MILESTONES[nextKey];
  const tier=rewards.tiers[nextKey];
  
  const streakPct=Math.min(100,Math.round(prog.streak/ms.streak*100));
  const minPct=Math.min(100,Math.round(prog.totalMin/ms.totalMin*100));
  const piecesPct=ms.piecesAtTarget?Math.min(100,Math.round(prog.piecesAtTarget/ms.piecesAtTarget*100)):100;
  const exprPct=ms.perfectExpr?Math.min(100,Math.round(prog.perfectExpr/ms.perfectExpr*100)):100;
  const perfPct=ms.perfReady?Math.min(100,Math.round(prog.perfReady/ms.perfReady*100)):100;

  return `<div class="reward-card" style="border-color:${ms.color}">
    <div class="reward-tier">Nächstes Ziel: ${ms.label}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${ms.required} von 5 Bedingungen nötig</div>
    ${tier.reward?`<div class="reward-text">🎁 ${esc(tier.reward)}</div>`:`<div style="font-size:11px;color:var(--muted)">Belohnung in ⚙ Einstellungen festlegen</div>`}
    <div class="reward-conditions">
      <div class="reward-cond-row"><span>${prog.streak>=ms.streak?'✅':'⬜'} ${ms.streak} Tage Streak</span><span>${prog.streak} / ${ms.streak}</span></div>
      <div class="reward-progress"><div class="reward-progress-fill" style="width:${streakPct}%;background:${ms.color}"></div></div>
      <div class="reward-cond-row"><span>${prog.totalMin>=ms.totalMin?'✅':'⬜'} ${ms.totalMin} Min geübt</span><span>${prog.totalMin} / ${ms.totalMin}</span></div>
      <div class="reward-progress"><div class="reward-progress-fill" style="width:${minPct}%;background:${ms.color}"></div></div>
      <div class="reward-cond-row"><span>${prog.piecesAtTarget>=ms.piecesAtTarget?'✅':'⬜'} ${ms.piecesAtTarget} Stücke auf Zieltempo</span><span>${prog.piecesAtTarget} / ${ms.piecesAtTarget}</span></div>
      <div class="reward-progress"><div class="reward-progress-fill" style="width:${piecesPct}%;background:${ms.color}"></div></div>
      <div class="reward-cond-row"><span>${prog.perfectExpr>=ms.perfectExpr?'✅':'⬜'} ${ms.perfectExpr}× Stück 4× Ausdruck ★★★★★</span><span>${prog.perfectExpr} / ${ms.perfectExpr}</span></div>
      <div class="reward-progress"><div class="reward-progress-fill" style="width:${exprPct}%;background:${ms.color}"></div></div>
      ${ms.perfReady?`<div class="reward-cond-row"><span>${prog.perfReady>=ms.perfReady?'✅':'⬜'} ${ms.perfReady} Stücke auftrittssicher 🟢</span><span>${prog.perfReady} / ${ms.perfReady}</span></div>
      <div class="reward-progress"><div class="reward-progress-fill" style="width:${perfPct}%;background:${ms.color}"></div></div>`:''}
    </div>
  </div>`;
}

function pieceCard(p){
  const secs=p.sections||[];
  const mainSec=secs.length?secs.reduce((a,s)=>s.targetBpm>a.targetBpm?s:a,secs[0]):null;
  const tgt=mainSec?mainSec.targetBpm:0;
  const key=mainSec?secKey(p.name,mainSec.name):p.name;
  const cur=getLast(key);
  const pct=tgt&&cur?Math.min(100,Math.round(cur/tgt*100)):0;
  const col=pct>=100?'var(--success)':'var(--accent)';
  const secInfo=secs.length>1?`<div style="font-size:10px;color:var(--muted);margin-top:2px">${secs.length} Takte</div>`:'';
  const pr=isPerformanceReady(p.name);
  const prBadge=pr.ready?'<div style="font-size:10px;font-weight:600;color:var(--success);margin-top:2px">🟢 Auftrittssicher</div>':pr.total>0?'<div style="font-size:10px;color:var(--muted);margin-top:2px">'+pr.streak+'/3 fehlerfrei</div>':'';
  return `<div class="piece" onclick="showDetail(${p.id})">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div class="piece-name">${esc(p.name)}</div><div class="piece-cat">${esc(p.cat)}</div></div>
      <div style="text-align:right">${tgt?`<div class="piece-bpm">${cur||'–'} / ${tgt}</div>`:''}${p.note?`<div style="font-size:10px;color:var(--muted)">${esc(p.note)}</div>`:''}${secInfo}${prBadge}</div>
    </div>
    ${tgt?`<div class="piece-bar${pct>=100?' piece-bar-done':''}"><div class="piece-fill" style="width:${pct}%;background:${col}"></div></div>`:''}
    ${sparkline(key,tgt,180,24)}
    ${tgt&&getHist(key).length?`<div class="piece-meta"><span>Aktuell: ${cur||'–'}</span><span>Ziel: ${tgt}</span></div>`:''}
  </div>`;
}

          (last?'<div style="flex:1"><div style="font-size:10px;color:var(--muted)">Ist</div><div style="font-size:16px;font-weight:600;color:var(--accent2);padding:10px 0">'+last+'</div></div>':'')+

    html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Kategorie</div>';
    html+='<select data-piece="'+p.id+'" data-field="cat" onchange="savePieceFields()" class="mb8">'+CATS.map(function(c){return '<option'+(c===p.cat?' selected':'')+'>'+c+'</option>';}).join('')+'</select>';
    html+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Notiz</div>';
    html+='<input type="text" value="'+esc(p.note||'')+'" placeholder="Komponist, Stil..." data-piece="'+p.id+'" data-field="note" class="mb8">';
    html+='<div style="margin-top:8px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">📐 Takte</div>'+secsHtml+'<button class="add-btn" onclick="savePieceFields();addSection('+p.id+')">+ Takte</button></div>';
    html+=linkEditor(notenLinks,'Noten','noten','🎵');
    html+=linkEditor(otherLinks,'Links','link','🔗');
    html+='<button class="btn btn-go mt12" onclick="savePieceFields();togglePieceEdit('+p.id+')" style="font-size:14px">✓ Speichern</button>';

function togglePieceEdit(id){
  savePieceFields();
  openPieceId=openPieceId===id?null:id;
  renderPiecesList();
}

// Read ALL fields from DOM and save to pieces array at once
function savePieceFields(){
  var list=document.getElementById("pieces-list");if(!list)return;
  // Piece-level fields
  list.querySelectorAll('[data-piece][data-field]:not([data-link]):not([data-sec])').forEach(function(el){
    var pid=parseInt(el.dataset.piece);
    var field=el.dataset.field;
    var p=pieces.find(function(x){return x.id===pid;});if(!p)return;
    p[field]=el.value;
  });
  // Section-level fields
  list.querySelectorAll('[data-piece][data-sec][data-field]').forEach(function(el){
    var pid=parseInt(el.dataset.piece);
    var si=parseInt(el.dataset.sec);
    var field=el.dataset.field;
    var p=pieces.find(function(x){return x.id===pid;});if(!p||!p.sections[si])return;
    var val=el.value;
    if(field==='startBpm'||field==='targetBpm')val=parseInt(val)||0;
    p.sections[si][field]=val;
  });
  // Link-level fields
  list.querySelectorAll('[data-piece][data-link][data-field]').forEach(function(el){
    var pid=parseInt(el.dataset.piece);
    var li=parseInt(el.dataset.link);
    var field=el.dataset.field;
    var p=pieces.find(function(x){return x.id===pid;});if(!p||!p.links[li])return;
    p.links[li][field]=el.value;
  });
  save();
}

function addSection(pieceId){var p=pieces.find(function(x){return x.id===pieceId;});if(p){var maxId=p.sections.reduce(function(a,s){return Math.max(a,s.id||0);},0);p.sections.push({id:maxId+1,name:'Neue Takte',startBpm:0,targetBpm:0});save();renderPiecesList();}}
function delSection(pieceId,si){savePieceFields();var p=pieces.find(function(x){return x.id===pieceId;});if(p&&p.sections.length>1){p.sections.splice(si,1);save();renderPiecesList();}else{alert('Mindestens ein Takt-Bereich nötig.');}}
function delPiece(id){pieces=pieces.filter(function(x){return x.id!==id;});save();renderPiecesList();}
function delLink(pieceId,j){savePieceFields();var p=pieces.find(function(x){return x.id===pieceId;});if(p){p.links.splice(j,1);save();renderPiecesList();}}
function addLink(pieceId,type){var p=pieces.find(function(x){return x.id===pieceId;});if(p){p.links.push({label:'',url:'',type:type||'link'});save();renderPiecesList();}}
function addPieceUI(){savePieceFields();pieces.push({id:Date.now(),name:"Neues Stück",cat:CATS[0],note:"",links:[],sections:[{id:1,name:'Ganzes Stück',startBpm:0,targetBpm:0}]});save();renderPiecesList();}

// === PRACTICE SESSION ===
let practiceMode='ueben'; // 'ueben' or 'spielen'
let practiceSectionIdx=0;

function startSessionFlow(pieceId){
  if(!sessionStart){sessionStart=Date.now();sessionTotalElapsed=0;}
  showPiecePicker(pieceId);
}

function showPiecePicker(autoId){
  if(autoId){showModePicker(autoId);return;}
  const el=document.getElementById("v-practice");
  const byCat={};pieces.forEach(p=>{if(!byCat[p.cat])byCat[p.cat]=[];byCat[p.cat].push(p);});
  let phtml='';
  Object.entries(byCat).forEach(function(e){
    const cat=e[0],ps=e[1];
    phtml+='<div style="font-size:11px;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px">'+esc(cat)+'</div>';
    ps.forEach(function(p){
      const secs=p.sections||[];
      const secText=secs.length>1?secs.length+' Takte':secs.length===1?secs[0].name:'';
      phtml+='<div class="piece" onclick="showModePicker('+p.id+')"><div class="piece-name">'+esc(p.name)+'</div><div style="font-size:11px;color:var(--muted)">'+esc(secText)+(p.note?' · '+esc(p.note):'')+'</div></div>';
    });
  });
  el.innerHTML='<div class="stitle">Stück wählen</div><div class="piece-picker">'+phtml+'</div>'+
    (sessionLog.length?'<div class="mt12"><button class="btn btn-p" onclick="endSessionFlow()">Session beenden ('+sessionLog.length+' Stücke)</button></div>':'<div class="mt12"><button class="btn btn-s" onclick="nav(\'home\')">Abbrechen</button></div>');
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("on"));el.classList.add("on");
  document.querySelectorAll(".nav button").forEach((b,i)=>b.classList.toggle("on",i===0));
}

function showModePicker(pieceId){
  const p=pieces.find(x=>x.id===pieceId);if(!p)return;
  const el=document.getElementById("v-practice");
  const secs=p.sections||[];
  
  // Section buttons for Üben mode

  if(secs.length>1){

    secs.forEach(function(s,i){
      const last=getSecLast(p.name,s.name);
      const pct=s.targetBpm&&last?Math.min(100,Math.round(last/s.targetBpm*100)):0;
      const col=pct>=100?'var(--success)':'var(--accent)';
      secBtns+='<div class="piece" onclick="startPracticePiece('+p.id+',\'ueben\','+i+')" style="padding:10px 12px;margin-bottom:6px">'+

        '<div style="font-size:11px;color:var(--accent2)">'+(last?last+' / ':'')+s.targetBpm+' BPM</div></div>'+
        (s.targetBpm?'<div class="piece-bar" style="margin-top:4px"><div class="piece-fill" style="width:'+pct+'%;background:'+col+'"></div></div>':'')+
        '</div>';
    });
    secBtns+='</div>';
  }

  el.innerHTML='<div style="text-align:center;padding:16px 0">'+
    '<div style="font-family:\'DM Serif Display\',serif;font-size:22px">'+esc(p.name)+'</div>'+
    '<div style="font-size:12px;color:var(--muted)">'+esc(p.cat)+(p.note?' · '+esc(p.note):'')+'</div>'+
    '</div>'+
    '<div class="row" style="gap:8px;margin-bottom:12px">'+
      '<button class="btn btn-go" onclick="'+(secs.length>1?'':'startPracticePiece('+p.id+',\'ueben\',0)')+'" style="flex:1;font-size:15px'+(secs.length>1?';opacity:.5;pointer-events:none':'')+'" '+(secs.length>1?'disabled':'')+'>🔧 Üben</button>'+
      '<button class="btn btn-p" onclick="startPracticePiece('+p.id+',\'spielen\',0)" style="flex:1;font-size:15px">🎭 Spielen</button>'+
    '</div>'+
    (secs.length>1?'<div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px">Wähle Takte zum Üben:</div>'+secBtns:'')+
    '<button class="btn btn-xs btn-s mt8" onclick="showPiecePicker()" style="color:var(--muted)">← Anderes Stück</button>';
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("on"));el.classList.add("on");

function startPracticePiece(id,mode,secIdx){
  const p=pieces.find(x=>x.id===id);if(!p)return;
  practiceMode=mode||'ueben';
  practiceSectionIdx=secIdx||0;
  practicePieceId=id;practicing=true;practiceElapsed=0;
  practicePaused=false;pauseStart=null;totalPausedMs=0;
  // Don't reset pomo - it runs across the whole session
  if(pomoBreakActive){pomoBreakActive=false;if(pomoBreakTimer){clearInterval(pomoBreakTimer);pomoBreakTimer=null;}}
  practiceStart=null;// Timer not started yet
  
  if(practiceMode==='ueben'){
    const sec=(p.sections||[])[practiceSectionIdx];
    if(sec){
      const key=secKey(p.name,sec.name);
      currentTempo=sec.startBpm||getSecLast(p.name,sec.name)||sec.targetBpm||80;
    }else{
      currentTempo=80;
    }
  }else{
    currentTempo=0;// No tempo tracking in play mode
  }
  rounds=[];roundStart=null;
  document.querySelectorAll(".view").forEach(x=>x.classList.remove("on"));
  document.getElementById("v-practice").classList.add("on");
  renderPractice();
}

const POMO_WORK=25*60; // 25 minutes
const POMO_BREAK=5*60; // 5 minutes
let pomoBreakActive=false,pomoBreakTimer=null,pomoBreakRemaining=0;
let sessionTotalElapsed=0; // Total seconds across all pieces in this session

function startPracticeTimer(){
  if(practiceStart)return;// Already running
  practiceStart=Date.now();
  roundStart=Date.now();
  practiceTimer=setInterval(function(){
    if(!practicePaused){
      practiceElapsed=Math.round((Date.now()-practiceStart-totalPausedMs)/1000);
      sessionTotalElapsed+=1;
      updatePracticeTimer();
      // Pomodoro check based on session total
      if(sessionTotalElapsed>0&&sessionTotalElapsed%POMO_WORK===0&&!pomoBreakActive){
        showPomoBreak();
      }
    }
  },1000);
  renderPractice();
}

function showPomoBreak(){
  pomoBreakActive=true;
  // Auto-pause the practice
  if(!practicePaused){
    practicePaused=true;pauseStart=Date.now();
    if(metroOn)mStop();
  }
  pomoBreakRemaining=POMO_BREAK;
  const el=document.getElementById("v-practice");
  renderPomoBreak(el);
  pomoBreakTimer=setInterval(function(){
    pomoBreakRemaining--;
    if(pomoBreakRemaining<=0){
      clearInterval(pomoBreakTimer);pomoBreakTimer=null;
      renderPomoBreak(el);
    }else{
      var bel=document.getElementById("pomo-break-time");
      if(bel)bel.textContent=fmt(pomoBreakRemaining);
    }
  },1000);
}

function renderPomoBreak(el){
  if(!el)el=document.getElementById("v-practice");
  const done=pomoBreakRemaining<=0;
  
  // Session progress
  var sessionMin=Math.round(sessionTotalElapsed/60);
  var planMin=lesson.planMinutes||30;
  var sessionPct=Math.min(100,Math.round(sessionMin/planMin*100));
  var sessionCol=sessionPct>=100?'var(--success)':'var(--accent)';
  
  // Per-piece breakdown
  var piecesHtml='';
  if(sessionLog.length){
    piecesHtml='<div style="text-align:left;margin-top:16px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px">';
    piecesHtml+='<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Heute geübt</div>';
    sessionLog.forEach(function(e){
      var eMin=Math.round(e.totalSec/60);
      piecesHtml+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>'+esc(e.pieceName)+(e.section?' · '+esc(e.section):'')+'</span><span style="font-weight:600;color:var(--accent)">'+eMin+' Min</span></div>';
    });
    // Current piece (still running)
    var curPiece=pieces.find(function(x){return x.id===practicePieceId;});
    if(curPiece){
      var curMin=Math.round(practiceElapsed/60);
      piecesHtml+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;color:var(--accent2)"><span>▶ '+esc(curPiece.name)+'</span><span style="font-weight:600">'+curMin+' Min</span></div>';
    }
    piecesHtml+='</div>';
  }
  
  el.innerHTML='<div style="text-align:center;padding:30px 16px">'+
    '<div style="font-size:48px;margin-bottom:12px">'+(done?'💪':'☕')+'</div>'+
    '<div style="font-family:\'DM Serif Display\',serif;font-size:24px;margin-bottom:8px">'+(done?'Pause vorbei!':'Pause machen!')+'</div>'+
    '<div style="font-size:14px;color:var(--muted);margin-bottom:16px">'+(done?'Bereit für die nächste Runde?':'Finger lockern, durchatmen!')+'</div>'+
    '<div style="margin-bottom:16px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;font-weight:500">Session-Fortschritt</span><span style="font-size:16px;font-weight:700;font-family:\'DM Serif Display\',serif;color:'+sessionCol+'">'+sessionMin+' / '+planMin+' Min</span></div>'+
      '<div style="width:100%;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden"><div style="width:'+sessionPct+'%;height:100%;background:'+sessionCol+';border-radius:5px"></div></div>'+
    '</div>'+
    (!done?'<div style="font-family:\'DM Serif Display\',serif;font-size:48px;color:var(--accent)" id="pomo-break-time">'+fmt(pomoBreakRemaining)+'</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Pause läuft...</div>':'')+
    piecesHtml+
    '<button class="btn btn-go mt12" onclick="endPomoBreak()" style="font-size:16px;padding:16px">'+(done?'▶ Weiter üben!':'▶ Pause überspringen')+'</button>'+
    '<button class="btn btn-xs btn-s mt8" onclick="stopPractice(false)" style="color:var(--muted)">⏹ Session beenden</button>'+
  '</div>';
}

function endPomoBreak(){
  pomoBreakActive=false;
  if(pomoBreakTimer){clearInterval(pomoBreakTimer);pomoBreakTimer=null;}
  // Resume practice
  if(practicePaused){
    totalPausedMs+=Date.now()-pauseStart;
    practicePaused=false;pauseStart=null;
  }
  renderPractice();
}

function renderPractice(){
  const p=pieces.find(x=>x.id===practicePieceId);if(!p)return;
  const el=document.getElementById("v-practice");
  const isRunning=!!practiceStart;
  const sec=(p.sections||[])[practiceSectionIdx];
  const isPlay=practiceMode==='spielen';
  
  let tempoHtml='';
  if(!isPlay&&sec){
    const key=secKey(p.name,sec.name);
    const lastBpm=getSecLast(p.name,sec.name);
    tempoHtml=`
    <div class="tempo-section">
      <div class="tempo-label">Aktuelles Tempo</div>
      <div class="tempo-val" id="tempo-display">${currentTempo}</div>
      <div class="tempo-btns">
        <button class="tempo-btn" onclick="adjTempo(-5)">-5</button>
        <button class="tempo-btn" onclick="adjTempo(-1)">-1</button>
        <button class="tempo-btn" style="width:52px;height:52px;font-size:13px;font-weight:700;background:${metroOn?'var(--danger)':'var(--accent2)'};color:#fff;border:none" id="practice-metro-btn" onclick="togglePracticeMetro()">${metroOn?'Stop':'♩'}</button>
        <button class="tempo-btn" onclick="adjTempo(1)">+1</button>
        <button class="tempo-btn" onclick="adjTempo(5)">+5</button>
      </div>
      ${sec.targetBpm?`<div class="tempo-target">Ziel: ${sec.targetBpm} BPM</div>`:''}
      ${lastBpm&&lastBpm!==currentTempo?`<div style="font-size:11px;color:var(--muted);margin-top:4px">Letztes Tempo: ${lastBpm} BPM</div>`:''}
      <div class="tempo-set">${[60,70,80,90,100,110,120].map(b=>`<button class="btn btn-xs btn-s" onclick="setTempoVal(${b})">${b}</button>`).join('')}</div>
      <div style="margin-top:8px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Subdivision</div><div class="tempo-set">${[1,2,3,4,6,8].map(function(n){return '<button class="btn btn-xs '+(metroSubdiv===n?'btn-go':'btn-s')+'" onclick="setPracticeSubdiv('+n+')">'+(n===1?'–':n===2?'♪':n===3?'♪³':n===4?'♬':''+n)+'</button>';}).join('')}</div></div>
    </div>`;
  }

  el.innerHTML=`
    <div class="practice-piece">
      <div style="display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:8px;background:${isPlay?'var(--accent3)':'var(--accent2)'};color:#fff">${isPlay?'🎭 Spielen':'🔧 Üben'}</div>
      <div class="practice-name">${esc(p.name)}</div>
      <div class="practice-cat">${esc(p.cat)}${!isPlay&&sec?' · '+esc(sec.name):''}</div>
      <input type="text" value="${esc(p.note||'')}" placeholder="Notiz zum Stück..." style="margin-top:6px;text-align:center;font-size:12px;color:var(--muted);font-style:italic" onchange="updatePieceNote(${p.id},this.value)">
      ${renderPieceLinks(p)}
      <div class="timer-big" id="p-timer" style="${practicePaused?'color:var(--muted)':!isRunning?'color:var(--border)':''}">${fmt(practiceElapsed)}</div>
      ${isRunning&&!practicePaused?`<div style="font-size:14px;color:var(--accent);font-weight:600;margin-top:4px">🍅 Pause in <span id="pomo-remaining">${fmt(POMO_WORK-(sessionTotalElapsed%POMO_WORK))}</span></div>`:''}
      ${practicePaused?'<div style="font-size:12px;color:var(--accent);font-weight:600;margin-top:4px">⏸ Pausiert</div>':''}
      ${!isRunning?'<div style="font-size:12px;color:var(--muted);margin-top:4px">'+(isPlay?'Wenn bereit, ▶ drücken':'Tempo einstellen, dann ▶ drücken')+'</div>':''}
    </div>
    ${tempoHtml}
    <div id="rounds-display"></div>
    <div class="row mt12" style="gap:8px">
      ${!isRunning?`<button class="btn btn-go" onclick="startPracticeTimer()" style="flex:1">▶ Start</button>`:`
      <button class="btn ${practicePaused?'btn-go':'btn-s'}" onclick="togglePause()" style="flex:1">${practicePaused?'▶ Weiter':'⏸ Pause'}</button>`}
      <button class="btn btn-stop" onclick="stopPractice(false)" style="flex:1">⏹ Stop</button>
    </div>
  `;
  updateRoundsDisplay();
}

function togglePause(){
  if(practicePaused){
    // Resume
    totalPausedMs+=Date.now()-pauseStart;
    practicePaused=false;pauseStart=null;
    roundStart=Date.now();
    if(metroOn){/* metro already stopped on pause */}
  }else{
    // Pause - save current round time
    const now=Date.now(),roundSec=Math.round((now-roundStart-totalPausedMs)/1000);
    // Don't save round here, just pause
    practicePaused=true;pauseStart=Date.now();
    if(metroOn)mStop();
  }
  renderPractice();
}

function updatePracticeTimer(){
  const el=document.getElementById("p-timer");if(el)el.textContent=fmt(practiceElapsed);
  const pel=document.getElementById("pomo-remaining");
  if(pel)pel.textContent=fmt(POMO_WORK-(sessionTotalElapsed%POMO_WORK));
}
function updatePieceNote(id,val){const p=pieces.find(x=>x.id===id);if(p){p.note=val;save();}}

function renderPieceLinks(p){
  const links=p.links||[];
  if(!links.length)return '';
  const noten=links.filter(l=>l.url&&l.type==='noten');
  const other=links.filter(l=>l.url&&l.type!=='noten');
  let html='';

function adjTempo(d){
  const newT=Math.max(20,Math.min(300,currentTempo+d));
  if(newT!==currentTempo){
    if(roundStart){
      const now=Date.now(),roundSec=Math.round((now-roundStart)/1000);
      if(roundSec>0)rounds.push({bpm:currentTempo,seconds:roundSec});
      roundStart=now;
    }
    currentTempo=newT;
    document.getElementById("tempo-display").textContent=currentTempo;
    updateRoundsDisplay();
    if(metroOn){metroBpm=currentTempo;mStop();mStart();}
  }
}
function setTempoVal(v){
  if(v!==currentTempo){
    if(roundStart){
      const now=Date.now(),roundSec=Math.round((now-roundStart)/1000);
      if(roundSec>0)rounds.push({bpm:currentTempo,seconds:roundSec});
      roundStart=now;
    }
    currentTempo=v;
    document.getElementById("tempo-display").textContent=currentTempo;
    updateRoundsDisplay();
    if(metroOn){metroBpm=currentTempo;mStop();mStart();}
  }
}

function togglePracticeMetro(){
  if(metroOn){
    mStop();
  }else{
    metroBpm=currentTempo;
    mStart();
  }
  const btn=document.getElementById("practice-metro-btn");
  if(btn){btn.textContent=metroOn?'Stop':'♩';btn.style.background=metroOn?'var(--danger)':'var(--accent2)';}
}

function setPracticeSubdiv(n){

function updateRoundsDisplay(){
  const el=document.getElementById("rounds-display");if(!el)return;
  if(!rounds.length){el.innerHTML='';return;}
  el.innerHTML='<div class="rounds"><div class="stitle">Tempo-Runden</div>'+rounds.map(r=>
    `<div class="round-item"><span class="round-bpm">${r.bpm} BPM</span><span class="round-time">${fmt(r.seconds)}</span></div>`
  ).join('')+'</div>';
}

// Pending piece data after stop, before rating
let pendingPiece=null;

function stopPractice(abort){
  clearInterval(practiceTimer);
  if(metroOn)mStop();
  const p=pieces.find(x=>x.id===practicePieceId);
  const isPlay=practiceMode==='spielen';
  const sec=p?(p.sections||[])[practiceSectionIdx]:null;
  
  if(!abort&&practicePieceId&&(practiceStart||isPlay)){
    if(!isPlay&&roundStart){
      const roundSec=Math.round((Date.now()-roundStart)/1000);
      if(roundSec>0)rounds.push({bpm:currentTempo,seconds:roundSec});
    }
    const totalSec=isPlay?practiceElapsed:(rounds.length?rounds.reduce(function(a,r){return a+r.seconds;},0):practiceElapsed);
    if(p&&(totalSec>0||isPlay)){
      // Save tempo to section-level key
      if(!isPlay&&sec&&rounds.length){
        const maxBpm=Math.max(...rounds.map(r=>r.bpm));
        const key=secKey(p.name,sec.name);
        if(!tempoHist[key])tempoHist[key]=[];
        tempoHist[key].push({date:new Date().toISOString(),bpm:maxBpm});
      }
      pendingPiece={
        pieceId:p.id,pieceName:p.name,
        section:sec?sec.name:null,
        mode:practiceMode,
        rounds:isPlay?[]:[...rounds],
        totalSec:totalSec||practiceElapsed,
        techRating:0,exprRating:0,
        overallRating:0,flowRating:0,errorFree:null // for play mode
      };
      save();
      practicing=false;practicePieceId=null;rounds=[];practiceStart=null;
      showRatingScreen();
      return;
    }
  }
  practicing=false;practicePieceId=null;rounds=[];pendingPiece=null;practiceStart=null;
}

function moveCat(i,dir){
  const j=i+dir;if(j<0||j>=CATS.length)return;

  save();renderSettings();

function removeCat(i){
  if(CATS.length<=1){alert("Mindestens eine Kategorie nötig.");return;}
  const old=CATS[i];CATS.splice(i,1);
  pieces.forEach(p=>{if(p.cat===old)p.cat=CATS[0];});

function renameCat(i,val){
  const old=CATS[i];CATS[i]=val;
  pieces.forEach(p=>{if(p.cat===old)p.cat=val;});

function resetApp(){
  if(!confirm("Wirklich ALLES zurücksetzen? Alle Daten gehen verloren!"))return;
  if(!confirm("Letzte Warnung: Das kann nicht rückgängig gemacht werden. Fortfahren?"))return;
  localStorage.removeItem("uz-pieces");
  localStorage.removeItem("uz-sessions");
  localStorage.removeItem("uz-tempo");
  localStorage.removeItem("uz-settings");
  localStorage.removeItem("uz-cats");
  localStorage.removeItem("uz-rewards");
  localStorage.removeItem("uz-lesson");
  pieces=structuredClone(DEF_PIECES);
  sessions=[];
  tempoHist={};
  settings={weeklyMin:60,days:[1,2,3,4,5]};
  CATS=[...DEF_CATS];
  rewards={tiers:{bronze:{reward:"",unlocked:false,celebrated:false},silver:{reward:"",unlocked:false,celebrated:false},gold:{reward:"",unlocked:false,celebrated:false},diamond:{reward:"",unlocked:false,celebrated:false}}};
  lesson={nextDate:null,homework:[],questions:[],feedback:''};

function exportData(){
  const data=JSON.stringify({pieces,sessions,tempoHist,settings,CATS,rewards,lesson},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="uebezeit-backup-"+new Date().toISOString().slice(0,19).replace(/[T:]/g,"-")+".json";
  a.click();URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.pieces||!data.sessions){alert("Ungültige Datei.");return;}
      if(!confirm("Alle aktuellen Daten werden überschrieben. Fortfahren?"))return;
      pieces=(data.pieces||pieces).map(p=>({...p,links:p.links||[]}));
      sessions=data.sessions||sessions;
      tempoHist=data.tempoHist||tempoHist;
      settings=data.settings||settings;
      CATS=data.CATS||CATS;
      if(data.rewards)rewards=data.rewards;
      if(data.lesson)lesson=data.lesson;
      save();
      alert("Daten erfolgreich importiert!");
      renderSettings();
    }catch(err){alert("Fehler beim Lesen der Datei.");}
  };
  reader.readAsText(file);
  e.target.value="";
}

function deletePieceFromSession(sessIdx,pieceName,pieceId){
  if(!confirm('Eintrag "'+pieceName+'" aus dieser Session löschen?'))return;
  const s=sessions[sessIdx];if(!s)return;
  s.pieces=s.pieces.filter(p=>p.name!==pieceName);
  s.totalSec=s.pieces.reduce((a,p)=>a+p.totalSec,0);
  if(!s.pieces.length){sessions.splice(sessIdx,1);}
  save();
  renderDetail(pieceId);
}

function buildChart(name,target){
  const hist=getHist(name);
  if(hist.length<2)return '';
  const W=340,H=160,PL=36,PR=10,PT=10,PB=28;
  const cw=W-PL-PR,ch=H-PT-PB;
  const data=hist.slice(-20);
  const bpms=data.map(x=>x.bpm);
  const allVals=target?[...bpms,target]:bpms;
  const minV=Math.min(...allVals)-5,maxV=Math.max(...allVals)+5;
  const range=maxV-minV||1;
  const x=i=>PL+(i/(data.length-1))*cw;
  const y=v=>PT+ch-((v-minV)/range)*ch;

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid lines and Y labels
  const steps=5;
  for(let i=0;i<=steps;i++){
    const v=minV+range*(i/steps);
    const yy=y(v);
    svg+=`<line x1="${PL}" y1="${yy}" x2="${W-PR}" y2="${yy}" stroke="var(--border)" stroke-width="0.5"/>`;
    svg+=`<text x="${PL-4}" y="${yy+3.5}" text-anchor="end" font-size="9" fill="var(--muted)">${Math.round(v)}</text>`;
  }

  // Target line
  if(target){
    const ty=y(target);
    svg+=`<line x1="${PL}" y1="${ty}" x2="${W-PR}" y2="${ty}" stroke="var(--accent2)" stroke-width="1.2" stroke-dasharray="5,3"/>`;
    svg+=`<text x="${W-PR+2}" y="${ty+3}" font-size="8" fill="var(--accent2)">Ziel</text>`;
  }

  // Line
  const pts=data.map((d,i)=>`${x(i)},${y(d.bpm)}`);
  svg+=`<polyline points="${pts.join(' ')}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;

  // Area fill
  svg+=`<polygon points="${PL},${y(minV)} ${pts.join(' ')} ${x(data.length-1)},${y(minV)}" fill="var(--accent)" opacity="0.08"/>`;

  // Dots
  data.forEach((d,i)=>{
    svg+=`<circle cx="${x(i)}" cy="${y(d.bpm)}" r="3" fill="var(--accent)" stroke="var(--surface)" stroke-width="1.5"/>`;
  });

  // X labels (dates)
  const labelCount=Math.min(data.length,6);
  const step=Math.max(1,Math.floor((data.length-1)/(labelCount-1)));
  for(let i=0;i<data.length;i+=step){
    const d=new Date(data[i].date);
    const label=d.toLocaleDateString("de-DE",{day:"numeric",month:"short"});
    svg+=`<text x="${x(i)}" y="${H-4}" text-anchor="middle" font-size="8" fill="var(--muted)">${label}</text>`;
  }
  // Always show last date
  if((data.length-1)%step!==0){
    const d=new Date(data[data.length-1].date);
    const label=d.toLocaleDateString("de-DE",{day:"numeric",month:"short"});
    svg+=`<text x="${x(data.length-1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="var(--muted)">${label}</text>`;
  }

  svg+='</svg>';
  return svg;
}

function setMetroPattern(p){
  metroPattern=p;
  if(metroOn){mStop();renderMetro();mStart();}
  else renderMetro();
}

function setSubdiv(n){
  metroSubdiv=n;
  if(metroOn){mStop();renderMetro();mStart();}
  else renderMetro();
}

function mClick(accent){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    if(accent===2){
      // Subdivision click: higher pitch, quieter
      o.frequency.value=500;
      g.gain.value=0.1;
    }else{
      o.frequency.value=accent?1000:700;
      g.gain.value=accent?0.4:0.2;
    }
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.06);
    o.start(audioCtx.currentTime);
    o.stop(audioCtx.currentTime+0.06);
  }catch(e){}
}
function mToggle(){metroOn?mStop():mStart();}
function mStart(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
    catch(e){alert('Audio wird nicht unterstützt');return;}
  }
  if(audioCtx.state==='suspended'){
    audioCtx.resume();
  }
  const bp=BEAT_PATTERNS[metroPattern];
  metroBt=0;metroOn=true;mUI();
  
  // Calculate base interval for the beat pattern
  var baseInterval;
  if(metroPattern==='triplet')baseInterval=Math.round(60000/metroBpm*(2/3));
  else if(metroPattern==='synkope')baseInterval=Math.round(60000/metroBpm/2);
  else baseInterval=Math.round(60000/metroBpm);
  
  if(metroSubdiv<=1){
    // No subdivision – normal behavior
    setTimeout(function(){
      mClick(true);mHL(0);
      metroInt=setInterval(function(){
        metroBt=(metroBt+1)%bp.beats;
        mClick(bp.pattern[metroBt]===1);
        mHL(metroBt);
      },baseInterval);
    },100);
  }else{
    // Subdivision: divide each beat interval
    var subdivInterval=Math.round(baseInterval/metroSubdiv);
    var subdivCount=0;
    var totalSubdivs=bp.beats*metroSubdiv;
    setTimeout(function(){
      mClick(true);mHL(0);
      subdivCount=1;
      metroInt=setInterval(function(){
        var beatIdx=Math.floor(subdivCount/metroSubdiv)%bp.beats;
        var isOnBeat=(subdivCount%metroSubdiv===0);
        if(isOnBeat){
          mClick(bp.pattern[beatIdx]===1);
          mHL(beatIdx);
        }else{
          mClick(2);// subdivision tick
        }
        subdivCount++;
      },subdivInterval);
    },100);
  }
}
function mStop(){clearInterval(metroInt);metroOn=false;metroBt=0;mUI();document.querySelectorAll("#m-dots .dot").forEach(function(d){d.classList.remove("on")});}
function mHL(b){var dots=document.querySelectorAll("#m-dots .dot");dots.forEach(function(d,i){d.classList.toggle("on",i===b);});}
function mBpm(d){metroBpm=Math.max(30,Math.min(240,metroBpm+d));const el=document.getElementById("m-bpm");if(el)el.textContent=metroBpm;if(metroOn){mStop();mStart();}}
function mSet(v){metroBpm=v;const el=document.getElementById("m-bpm");if(el)el.textContent=metroBpm;if(metroOn){mStop();mStart();}}
function mSetGo(v){metroBpm=v;const el=document.getElementById("m-bpm");if(el)el.textContent=metroBpm;mStop();mStart();}
function mUI(){const b=document.getElementById("m-tog");if(!b)return;b.textContent=metroOn?"Stop":"Start";b.style.background=metroOn?"var(--danger)":"var(--accent2)";}

function renderLog(){
  const el=document.getElementById("v-log");

  html+=sessionsReversed.map(function(item){
    const s=item.s,i=item.idx;
      const d=fmtDate(s.date);
      const min=Math.round(s.totalSec/60);
      const minLabel=min<1?'< 1 Min':min+' Min';

        const pMin=Math.round(p.totalSec/60);

        const secLabel=p.section?' <span style="font-size:11px;color:var(--muted);font-weight:400">· '+esc(p.section)+'</span>':'';
        let rHtml=(p.rounds||[]).map(r=>'<div class="log-rnd"><span class="log-rnd-bpm">'+r.bpm+' BPM</span><span>'+fmt(r.seconds)+'</span></div>').join('');
        let ratHtml='';
        if(isPlay&&(p.overallRating||p.flowRating||p.exprRating||p.errorFree!=null)){

          if(p.errorFree!=null)ratHtml+='<div style="font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;background:'+(p.errorFree?'var(--success)':'var(--danger)')+';color:#fff">'+(p.errorFree?'✅ Fehlerfrei':'❌ Mit Fehlern')+'</div>';

          if(p.flowRating)ratHtml+='<div style="font-size:13px"><span style="color:var(--accent4)">'+'★'.repeat(p.flowRating)+'☆'.repeat(5-p.flowRating)+'</span> <span style="font-size:10px;color:var(--muted)">Flow</span></div>';
          if(p.exprRating)ratHtml+='<div style="font-size:13px"><span style="color:var(--accent4)">'+'★'.repeat(p.exprRating)+'☆'.repeat(5-p.exprRating)+'</span> <span style="font-size:10px;color:var(--muted)">Ausdruck</span></div>';
          ratHtml+='</div>';
        }else if(!isPlay&&(p.techRating||p.exprRating)){
          ratHtml='<div style="margin-top:4px;display:flex;gap:10px"><div style="font-size:13px"><span style="color:var(--accent4)">'+'★'.repeat(p.techRating||0)+'☆'.repeat(5-(p.techRating||0))+'</span> <span style="font-size:10px;color:var(--muted)">Technik</span></div><div style="font-size:13px"><span style="color:var(--accent4)">'+'★'.repeat(p.exprRating||0)+'☆'.repeat(5-(p.exprRating||0))+'</span> <span style="font-size:10px;color:var(--muted)">Ausdruck</span></div></div>';

        const vals=Object.keys(labels).map(k=>{const v=s.reflection[k];if(!v)return '';return labels[k]+' '+v;}).filter(Boolean).join(' · ');
