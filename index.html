}

function editPieceTime(sessIdx,pieceName){
  var s=sessions[sessIdx];if(!s)return;
  var sp=s.pieces.find(function(p){return p.name===pieceName;});
  if(!sp)return;
  var curMin=Math.round(sp.totalSec/60);
  var newMin=prompt('Übezeit für "'+pieceName+'" ändern (Minuten):',curMin);
  if(newMin===null)return;
  newMin=parseInt(newMin);
  if(isNaN(newMin)||newMin<0){alert('Ungültige Eingabe.');return;}
  sp.totalSec=newMin*60;
  // Recalculate session total
  s.totalSec=s.pieces.reduce(function(a,p){return a+p.totalSec;},0);
  save();
  renderLog();
}

// === STATS ===
function renderStats(){
  const el=document.getElementById("v-stats");
  if(!sessions.length){el.innerHTML='<div class="stitle">Statistik</div><div class="empty"><div style="font-size:28px;margin-bottom:8px">📈</div>Noch keine Daten.<br>Starte deine erste Session!</div>';return;}

  el.innerHTML=`
    <div class="stitle">Statistik</div>
    ${buildSollIst()}
    ${buildWeekCompare()}
    ${buildAttention()}
    ${buildReflectionStats()}
    ${buildRatingCharts()}
    ${buildCatHistory()}
  `;
}

// --- Soll/Ist Vergleich ---
function buildSollIst(){
  // Only show pieces that have sections with targets
  var piecesWithTargets=pieces.filter(function(p){
    return (p.sections||[]).some(function(s){return s.targetBpm>0;});
  });
  if(!piecesWithTargets.length)return '';

  var rows=piecesWithTargets.map(function(p){
    var secs=p.sections||[];
    var pr=isPerformanceReady(p.name);
    
    // Overall piece progress
    var totalPct=0,secCount=0;
    var secsHtml=secs.map(function(s){
      if(!s.targetBpm)return '';
      secCount++;
      var last=getSecLast(p.name,s.name);
      var pct=last?Math.min(100,Math.round(last/s.targetBpm*100)):0;
      totalPct+=pct;
      var col=pct>=100?'var(--success)':pct>=60?'var(--accent)':'var(--danger)';
      return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
        '<div style="flex:1;font-size:11px;color:var(--muted);min-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(s.name)+'</div>'+
        '<div style="flex:2;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative">'+
          '<div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:4px;transition:width .3s"></div>'+
        '</div>'+
        '<div style="font-size:11px;font-weight:600;color:'+col+';min-width:55px;text-align:right">'+(last||'–')+' / '+s.targetBpm+'</div>'+
      '</div>';
    }).join('');
    
    var avgPct=secCount?Math.round(totalPct/secCount):0;
    var avgCol=avgPct>=100?'var(--success)':avgPct>=60?'var(--accent)':'var(--danger)';
    
    // Days since last practice
    var lastSess=sessions.filter(function(s){return(s.pieces||[]).some(function(sp){return sp.name===p.name;});});
    var daysSince=lastSess.length?Math.floor((Date.now()-new Date(lastSess[lastSess.length-1].date).getTime())/86400000):999;
    var daysText=daysSince===0?'Heute':daysSince===1?'Gestern':daysSince<999?'Vor '+daysSince+'d':'Nie geübt';
    
    // Session count this week
    var weekStart=getMonday();
    var weekSess=sessions.filter(function(s){return new Date(s.date)>=weekStart&&(s.pieces||[]).some(function(sp){return sp.name===p.name;});}).length;
    
    return '<div style="padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;border-left:4px solid '+avgCol+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
        '<div style="font-size:13px;font-weight:600">'+esc(p.name)+
          (pr.ready?' <span style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--success);color:#fff">🟢</span>':
           pr.total>0?' <span style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--muted)">'+pr.streak+'/3</span>':'')+
        '</div>'+
        '<div style="font-size:20px;font-weight:700;font-family:\'DM Serif Display\',serif;color:'+avgCol+'">'+avgPct+'%</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;font-size:10px;color:var(--muted);margin-bottom:8px">'+
        '<span>'+daysText+'</span>'+
        '<span>'+weekSess+'× diese Woche</span>'+
      '</div>'+
      secsHtml+
    '</div>';
  }).join('');

  // Overall progress
  var allSecs=[];
  piecesWithTargets.forEach(function(p){
    (p.sections||[]).forEach(function(s){
      if(s.targetBpm){
        var last=getSecLast(p.name,s.name);
        allSecs.push({pct:last?Math.min(100,Math.round(last/s.targetBpm*100)):0});
      }
    });
  });
  var overallPct=allSecs.length?Math.round(allSecs.reduce(function(a,s){return a+s.pct;},0)/allSecs.length):0;
  var atTarget=allSecs.filter(function(s){return s.pct>=100;}).length;
  var overallCol=overallPct>=100?'var(--success)':overallPct>=60?'var(--accent)':'var(--danger)';

  return '<div class="stat-card"><div class="stat-card-title">Soll / Ist</div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
      '<div style="font-size:12px;color:var(--muted)">'+atTarget+' / '+allSecs.length+' Abschnitte auf Ziel</div>'+
      '<div style="font-size:24px;font-weight:700;font-family:\'DM Serif Display\',serif;color:'+overallCol+'">'+overallPct+'%</div>'+
    '</div>'+
    '<div style="width:100%;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-bottom:12px">'+
      '<div style="width:'+overallPct+'%;height:100%;background:'+overallCol+';border-radius:5px;transition:width .3s"></div>'+
    '</div>'+
    rows+'</div>';
}

// --- Reflexions-Statistik ---
function buildReflectionStats(){
  const reflSessions=sessions.filter(s=>s.reflection);
  if(!reflSessions.length)return '<div class="stat-card"><div class="stat-card-title">🪞 Selbstreflexion</div><div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">Noch keine Reflexionsdaten vorhanden.</div></div>';

  const keys=['focused','patient','slow','stamina','expressive','joyful','flow','satisfied'];
  const labels={focused:'Konzentration',patient:'Geduld',slow:'Langsam geübt',stamina:'Kraft / Ausdauer',expressive:'Ausdruck',joyful:'Freude',flow:'Flow',satisfied:'Zufriedenheit'};
  
  // Calculate averages
  const sums={},counts={};
  keys.forEach(k=>{sums[k]=0;counts[k]=0;});
  reflSessions.forEach(s=>{
    keys.forEach(k=>{
      if(s.reflection[k]){sums[k]+=s.reflection[k];counts[k]++;}
    });
  });
  const avgs={};
  keys.forEach(k=>{avgs[k]=counts[k]?Math.round(sums[k]/counts[k]*10)/10:0;});
  const overall=keys.filter(k=>avgs[k]>0);
  const totalAvg=overall.length?Math.round(overall.reduce((a,k)=>a+avgs[k],0)/overall.length*10)/10:0;

  // Grade
  let grade='',gradeColor='',gradeEmoji='';
  if(totalAvg>=9){grade='Hervorragend';gradeColor='var(--success)';gradeEmoji='🌟';}
  else if(totalAvg>=7.5){grade='Sehr gut';gradeColor='var(--accent2)';gradeEmoji='💪';}
  else if(totalAvg>=6){grade='Gut';gradeColor='var(--accent4)';gradeEmoji='👍';}
  else if(totalAvg>=4){grade='Ausbaufähig';gradeColor='var(--accent)';gradeEmoji='📈';}
  else{grade='Dran bleiben!';gradeColor='var(--danger)';gradeEmoji='🔥';}

  const scaleColor=(v)=>{
    if(v<=3)return '#e74c3c';if(v<=5)return '#e67e22';if(v<=7)return '#f1c40f';if(v<=9)return '#2ecc71';return '#27ae60';
  };

  // Bars
  const bars=keys.map(k=>{
    const v=avgs[k];if(!v)return '';
    const pct=Math.round(v/10*100);
    const col=scaleColor(v);
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:500">${labels[k]}</span><span style="font-weight:700;color:${col}">${v}</span></div>
      <div style="width:100%;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${col};border-radius:4px"></div></div>
    </div>`;
  }).join('');

  // Trend (last 5 sessions vs previous 5)
  let trendHtml='';
  if(reflSessions.length>=4){
    const half=Math.floor(reflSessions.length/2);
    const recent=reflSessions.slice(-half);
    const older=reflSessions.slice(0,half);
    const avgOf=(arr)=>{
      let s=0,c=0;
      arr.forEach(sess=>keys.forEach(k=>{if(sess.reflection[k]){s+=sess.reflection[k];c++;}}));
      return c?Math.round(s/c*10)/10:0;
    };
    const recentAvg=avgOf(recent);
    const olderAvg=avgOf(older);
    const diff=Math.round((recentAvg-olderAvg)*10)/10;
    if(diff>0)trendHtml=`<div style="font-size:12px;margin-top:8px;color:var(--success)">📈 Trend: +${diff} gegenüber früheren Sessions</div>`;
    else if(diff<0)trendHtml=`<div style="font-size:12px;margin-top:8px;color:var(--danger)">📉 Trend: ${diff} gegenüber früheren Sessions</div>`;
    else trendHtml=`<div style="font-size:12px;margin-top:8px;color:var(--muted)">➡ Trend: Stabil</div>`;
  }

  // Strength & weakness
  const sorted=keys.filter(k=>avgs[k]>0).sort((a,b)=>avgs[b]-avgs[a]);
  let insightHtml='';
  if(sorted.length>=2){
    const best=sorted[0],worst=sorted[sorted.length-1];
    insightHtml=`<div style="margin-top:10px;font-size:12px">
      <div style="color:var(--success);margin-bottom:3px">💚 Stärke: <b>${labels[best]}</b> (Ø ${avgs[best]})</div>
      <div style="color:var(--accent)">🔧 Potential: <b>${labels[worst]}</b> (Ø ${avgs[worst]})</div>
    </div>`;
  }

  return `<div class="stat-card">
    <div class="stat-card-title">🪞 Selbstreflexion</div>
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:36px">${gradeEmoji}</div>
      <div style="font-family:'DM Serif Display',serif;font-size:28px;color:${gradeColor}">${totalAvg}</div>
      <div style="font-size:14px;font-weight:600;color:${gradeColor}">${grade}</div>
      <div style="font-size:11px;color:var(--muted)">${reflSessions.length} Sessions mit Reflexion</div>
    </div>
    ${bars}
    ${trendHtml}
    ${insightHtml}
  </div>`;
}

// --- Wochen-Vergleich ---
function buildWeekCompare(){
  const weeks=[];
  for(let w=0;w<4;w++){
    const start=new Date(getMonday());start.setDate(start.getDate()-w*7);
    const end=new Date(start);end.setDate(end.getDate()+7);
    const wSess=sessions.filter(s=>{const d=new Date(s.date);return d>=start&&d<end;});
    const min=wSess.reduce((a,s)=>a+Math.round(s.totalSec/60),0);
    const count=wSess.length;
    let techSum=0,exprSum=0,ratCount=0;
    wSess.forEach(s=>(s.pieces||[]).forEach(p=>{
      if(p.techRating||p.exprRating){techSum+=p.techRating||0;exprSum+=p.exprRating||0;ratCount++;}
    }));
    const label=w===0?'Diese Woche':w===1?'Letzte Woche':'Vor '+w+' Wochen';
    weeks.push({label,min,count,avgTech:ratCount?Math.round(techSum/ratCount*10)/10:0,avgExpr:ratCount?Math.round(exprSum/ratCount*10)/10:0,ratCount});
  }
  const maxMin=Math.max(...weeks.map(w=>w.min))||1;
  const rows=weeks.map(w=>{
    const pct=Math.round(w.min/maxMin*100);
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:500">${w.label}</span><span style="color:var(--muted)">${w.count} Sessions</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--accent);border-radius:4px"></div></div>
        <span style="font-size:13px;font-weight:700;color:var(--accent);min-width:45px;text-align:right">${w.min} Min</span>
      </div>
      ${w.ratCount?`<div style="font-size:11px;color:var(--muted);margin-top:2px">Ø Technik: ${w.avgTech} · Ø Ausdruck: ${w.avgExpr}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="stat-card"><div class="stat-card-title">Wochen-Vergleich</div>${rows}</div>`;
}

// --- Stücke die Aufmerksamkeit brauchen ---
function buildAttention(){
  const items=[];
  pieces.forEach(p=>{
    const hist=getHist(p.name);
    // Lange nicht geübt
    const lastSess=sessions.filter(s=>(s.pieces||[]).some(sp=>sp.name===p.name));
    const daysSince=lastSess.length?Math.floor((Date.now()-new Date(lastSess[0].date).getTime())/86400000):999;

    // Sinkende Bewertung (letzte 3 vs davor)
    const allRatings=[];
    sessions.forEach(s=>(s.pieces||[]).forEach(sp=>{
      if(sp.name===p.name&&(sp.techRating||sp.exprRating))allRatings.push({tech:sp.techRating||0,expr:sp.exprRating||0});
    }));

    let reason='',priority=0;
    if(daysSince>=7&&lastSess.length>0){reason='Seit '+daysSince+' Tagen nicht geübt';priority=daysSince;}
    else if(daysSince===999&&sessions.length>0){reason='Noch nie geübt';priority=1000;}

    if(allRatings.length>=3){
      const last3=allRatings.slice(0,3);
      const prev=allRatings.slice(3,6);
      if(prev.length>=2){
        const avgLast=(last3.reduce((a,r)=>a+r.tech+r.expr,0))/(last3.length*2);
        const avgPrev=(prev.reduce((a,r)=>a+r.tech+r.expr,0))/(prev.length*2);
        if(avgLast<avgPrev-0.5&&(!reason||priority<50)){reason='Bewertung sinkt (Ø '+avgLast.toFixed(1)+' → '+avgPrev.toFixed(1)+')';priority=50;}
      }
    }

    // Check sections for tempo progress
    const secs=p.sections||[];
    secs.forEach(function(sec){
      const key=secKey(p.name,sec.name);
      const secHist=getSecHist(p.name,sec.name);
      const tgt=sec.targetBpm||0;
      const cur=secHist.length?secHist[secHist.length-1].bpm:0;
      if(tgt&&cur&&cur<tgt*0.6&&!reason){reason='Weit vom Ziel: '+esc(sec.name)+' ('+cur+'/'+tgt+' BPM)';priority=30;}
    });

    if(reason)items.push({name:p.name,reason,priority,daysSince});
  });

  items.sort((a,b)=>b.priority-a.priority);
  if(!items.length)return '<div class="stat-card"><div class="stat-card-title">Braucht Aufmerksamkeit</div><div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">Alles im grünen Bereich! 👍</div></div>';

  return `<div class="stat-card"><div class="stat-card-title">Braucht Aufmerksamkeit</div>${items.slice(0,5).map(it=>{
    const col=it.priority>=100?'var(--danger)':it.priority>=50?'var(--accent)':'var(--accent4)';
    return `<div class="attention-item"><div><div class="attention-name">${esc(it.name)}</div><div class="attention-reason">${it.reason}</div></div><span class="attention-badge" style="background:${col};color:#fff">${it.priority>=100?'⚠':'!'}</span></div>`;
  }).join('')}</div>`;
}

// --- Bewertungs-Verlauf pro Stück ---
function buildRatingCharts(){
  // Find pieces that have ratings
  const rated=pieces.filter(p=>{
    return sessions.some(s=>(s.pieces||[]).some(sp=>sp.name===p.name&&(sp.techRating||sp.exprRating)));
  });
  if(!rated.length)return '<div class="stat-card"><div class="stat-card-title">Bewertungs-Verlauf</div><div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">Noch keine Bewertungen vorhanden.</div></div>';

  const charts=rated.map(p=>{
    // Collect ratings chronologically (oldest first = left)
    const data=[];
    sessions.forEach(s=>{
      (s.pieces||[]).forEach(sp=>{
        if(sp.name===p.name&&(sp.techRating||sp.exprRating))data.push({date:s.date,tech:sp.techRating||0,expr:sp.exprRating||0});
      });
    });
    if(data.length<2)return `<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">${esc(p.name)}</div><div style="font-size:11px;color:var(--muted)">Erst ${data.length} Bewertung – Verlauf ab 2</div></div>`;

    const last12=data.slice(-12);
    const W=300,H=100,PL=24,PR=8,PT=8,PB=20;
    const cw=W-PL-PR,ch=H-PT-PB;
    const x=i=>PL+(i/(last12.length-1))*cw;
    const y=v=>PT+ch-((v-0.5)/5)*ch;

    let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    // Grid
    for(let i=1;i<=5;i++){const yy=y(i);svg+=`<line x1="${PL}" y1="${yy}" x2="${W-PR}" y2="${yy}" stroke="var(--border)" stroke-width="0.5"/>`;svg+=`<text x="${PL-3}" y="${yy+3}" text-anchor="end" font-size="8" fill="var(--muted)">${i}</text>`;}

    // Tech line
    const techPts=last12.map((d,i)=>`${x(i)},${y(d.tech)}`);
    svg+=`<polyline points="${techPts.join(' ')}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    // Expr line
    const exprPts=last12.map((d,i)=>`${x(i)},${y(d.expr)}`);
    svg+=`<polyline points="${exprPts.join(' ')}" fill="none" stroke="var(--accent2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,2"/>`;
    // Dots
    last12.forEach((d,i)=>{
      svg+=`<circle cx="${x(i)}" cy="${y(d.tech)}" r="2.5" fill="var(--accent)"/>`;
      svg+=`<circle cx="${x(i)}" cy="${y(d.expr)}" r="2.5" fill="var(--accent2)"/>`;
    });
    // Date labels
    const step=Math.max(1,Math.floor((last12.length-1)/3));
    for(let i=0;i<last12.length;i+=step){
      const d=new Date(last12[i].date);
      svg+=`<text x="${x(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--muted)">${d.toLocaleDateString("de-DE",{day:"numeric",month:"short"})}</text>`;
    }
    if((last12.length-1)%step!==0){const d=new Date(last12[last12.length-1].date);svg+=`<text x="${x(last12.length-1)}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--muted)">${d.toLocaleDateString("de-DE",{day:"numeric",month:"short"})}</text>`;}
    svg+='</svg>';

    const avgT=Math.round(last12.reduce((a,d)=>a+d.tech,0)/last12.length*10)/10;
    const avgE=Math.round(last12.reduce((a,d)=>a+d.expr,0)/last12.length*10)/10;

    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div style="font-size:13px;font-weight:600">${esc(p.name)}</div><div style="font-size:11px;color:var(--muted)">Ø ${avgT} T · ${avgE} A</div></div>
      <div class="stat-chart">${svg}</div>
      <button class="btn btn-xs btn-s" onclick="analyzePiece('${esc(p.name).replace(/'/g,"\\'")}')" style="margin-top:4px;display:flex;align-items:center;justify-content:center;gap:4px;width:100%">🤖 ${getAnalysisCache(p.name)?'Neue Analyse':'Analyse & Empfehlung'}</button>
      <div id="analysis-${p.id}" style="margin-top:6px">${renderCachedAnalysis(p.name)}</div>
    </div>`;
  }).join('');

  return `<div class="stat-card"><div class="stat-card-title">Bewertungs-Verlauf</div>
    <div style="display:flex;gap:12px;margin-bottom:10px"><div class="legend-row"><div class="legend-dot" style="background:var(--accent)"></div><span style="color:var(--muted)">Technik</span></div><div class="legend-row"><div class="legend-dot" style="background:var(--accent2)"></div><span style="color:var(--muted)">Ausdruck</span></div></div>
    ${charts}</div>`;
}

// --- Kategorie-Verteilung letzte Wochen ---
function buildCatHistory(){
  const weekData=[];
  for(let w=0;w<4;w++){
    const start=new Date(getMonday());start.setDate(start.getDate()-w*7);
    const end=new Date(start);end.setDate(end.getDate()+7);
    const wSess=sessions.filter(s=>{const d=new Date(s.date);return d>=start&&d<end;});
    const catMin={};
    wSess.forEach(s=>(s.pieces||[]).forEach(sp=>{
      const p=pieces.find(x=>x.name===sp.name);
      const cat=p?p.cat:'Sonstiges';
      catMin[cat]=(catMin[cat]||0)+Math.round(sp.totalSec/60);
    }));
    const label=w===0?'Diese Wo.':w===1?'Letzte Wo.':'Vor '+w+' Wo.';
    weekData.push({label,catMin});
  }

  // Collect all cats
  const allCats=[...new Set(weekData.flatMap(w=>Object.keys(w.catMin)))];
  if(!allCats.length)return '';

  const maxMin=Math.max(...weekData.map(w=>Object.values(w.catMin).reduce((a,v)=>a+v,0)))||1;

  const rows=weekData.map(w=>{
    const total=Object.values(w.catMin).reduce((a,v)=>a+v,0);
    if(!total)return `<div style="margin-bottom:8px"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">${w.label}</div><div style="font-size:11px;color:var(--muted);font-style:italic">Keine Daten</div></div>`;
    const bar=allCats.map((c,ci)=>{
      const min=w.catMin[c]||0;if(!min)return '';
      const pct=Math.round(min/maxMin*100);
      return `<div style="width:${pct}%;background:${CAT_COLORS[ci%CAT_COLORS.length]};height:100%;min-width:1px" title="${c}: ${min} Min"></div>`;
    }).join('');
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px"><span>${w.label}</span><span>${total} Min</span></div>
      <div style="width:100%;height:14px;border-radius:4px;overflow:hidden;display:flex;background:var(--surface2)">${bar}</div>
    </div>`;
  }).join('');

  const legend=allCats.map((c,i)=>`<div class="legend-row"><div class="legend-dot" style="background:${CAT_COLORS[i%CAT_COLORS.length]}"></div><span style="color:var(--muted)">${esc(c)}</span></div>`).join('');

  return `<div class="stat-card"><div class="stat-card-title">Kategorien im Zeitverlauf</div>${rows}<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">${legend}</div></div>`;
}

// === LESSON MODULE ===
function renderLesson(){
  var el=document.getElementById('v-lesson');
  
  // Countdown
  var countdownHtml='';
  if(lesson.nextDate){
    var next=new Date(lesson.nextDate);
    var now=new Date();
    var diffMs=next.getTime()-now.getTime();
    var diffDays=Math.ceil(diffMs/86400000);
    var dateStr=next.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    var countdownText=diffDays===0?'Heute!':diffDays===1?'Morgen':diffDays>0?'in '+diffDays+' Tagen':'Überfällig ('+Math.abs(diffDays)+' Tage)';
    var countdownCol=diffDays<=0?'var(--danger)':diffDays<=2?'var(--accent)':'var(--accent2)';
    countdownHtml='<div class="card" style="text-align:center"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Nächster Unterricht</div><div style="font-family:\'DM Serif Display\',serif;font-size:20px;margin:4px 0">'+dateStr+'</div><div style="font-size:16px;font-weight:700;color:'+countdownCol+'">'+countdownText+'</div></div>';
  }else{
    countdownHtml='<div class="card" style="text-align:center"><div style="font-size:13px;color:var(--muted)">Kein Unterricht geplant</div><button class="btn btn-xs btn-go mt8" onclick="setLessonDate()">📅 Datum festlegen</button></div>';
  }

  // Homework with auto-status
  var hwHtml='';
  var hwItems=lesson.homework||[];
  if(hwItems.length){
    // Calculate status per homework
    var statusItems=hwItems.map(function(hw,hi){
      var status={pct:0,color:'var(--danger)',label:'Nicht geübt',sessions:0,lastBpm:0,targetBpm:0,techRating:0,exprRating:0};
      if(hw.pieceName){
        var p=pieces.find(function(x){return x.name===hw.pieceName;});
        // Count sessions since last lesson date
        var sinceDate=lesson.lastLessonDate?new Date(lesson.lastLessonDate):new Date(0);
        var pSess=sessions.filter(function(s){
          return new Date(s.date)>=sinceDate&&(s.pieces||[]).some(function(sp){return sp.name===hw.pieceName;});
        });
        status.sessions=pSess.length;
        
        if(hw.sectionName&&p){
          var last=getSecLast(hw.pieceName,hw.sectionName);
          var sec=(p.sections||[]).find(function(s){return s.name===hw.sectionName;});
          var tgt=hw.targetBpm||( sec?sec.targetBpm:0)||0;
          status.lastBpm=last;
          status.targetBpm=tgt;
          if(tgt&&last)status.pct=Math.min(100,Math.round(last/tgt*100));
        }
        // Get latest ratings
        for(var si=sessions.length-1;si>=0;si--){
          var sess=sessions[si];
          var sp=(sess.pieces||[]).find(function(x){return x.name===hw.pieceName;});
          if(sp){
            status.techRating=sp.techRating||sp.overallRating||0;
            status.exprRating=sp.exprRating||0;
            break;
          }
        }
        // Performance ready check
        var pr=isPerformanceReady(hw.pieceName);
        if(pr.ready)status.pct=100;
        
        if(status.pct>=100){status.color='var(--success)';status.label='Erledigt ✓';}
        else if(status.sessions>0){status.color='var(--accent)';status.label='In Arbeit';}
        else{status.color='var(--danger)';status.label='Nicht geübt';}
      }else{
        // No piece linked - just show text
        status.label='Kein Stück verknüpft';status.color='var(--muted)';
      }
      return {hw:hw,idx:hi,status:status};
    });
    
    // Sort: red first, then orange, then green
    statusItems.sort(function(a,b){
      var order={'var(--danger)':0,'var(--accent)':1,'var(--muted)':2,'var(--success)':3};
      return (order[a.status.color]||0)-(order[b.status.color]||0);
    });

    // Overall progress
    var totalPct=statusItems.length?Math.round(statusItems.reduce(function(a,s){return a+s.status.pct;},0)/statusItems.length):0;
    var doneCount=statusItems.filter(function(s){return s.status.pct>=100;}).length;
    var hangCount=statusItems.filter(function(s){return s.status.color==='var(--danger)';}).length;
    
    hwHtml+='<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:12px;font-weight:600">'+doneCount+'/'+statusItems.length+' erledigt</span>'+(hangCount?'<span style="font-size:12px;font-weight:600;color:var(--danger)">'+hangCount+' offen 🔴</span>':doneCount>=statusItems.length?'<span style="font-size:12px;color:var(--success);font-weight:600">Alles erledigt 👍</span>':'<span style="font-size:12px;color:var(--accent);font-weight:600">'+(statusItems.length-doneCount)+' in Arbeit</span>')+'</div>';
    hwHtml+='<div style="width:100%;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden"><div style="width:'+totalPct+'%;height:100%;background:'+(totalPct>=100?'var(--success)':'var(--accent)')+';border-radius:4px;transition:width .3s"></div></div></div>';

    statusItems.forEach(function(item){
      var hw=item.hw,st=item.status;
      hwHtml+='<div style="padding:12px;background:var(--surface);border:1px solid var(--border);border-left:4px solid '+st.color+';border-radius:10px;margin-bottom:8px">';
      hwHtml+='<div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:600">'+(hw.pieceName?esc(hw.pieceName):'Aufgabe')+(hw.sectionName?' · '+esc(hw.sectionName):'')+'</div><button class="rm-btn" style="width:24px;height:24px;font-size:12px" onclick="removeHomework('+item.idx+')">×</button></div>';
      if(hw.targetText)hwHtml+='<div style="font-size:12px;color:var(--muted);margin-top:2px">📝 '+esc(hw.targetText)+'</div>';
      hwHtml+='<div style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap">';
      hwHtml+='<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:'+st.color+';color:#fff">'+st.label+'</span>';
      if(st.sessions)hwHtml+='<span style="font-size:11px;color:var(--muted)">'+st.sessions+'× geübt</span>';
      if(st.targetBpm&&st.lastBpm)hwHtml+='<span style="font-size:11px;color:var(--accent2);font-weight:600">'+st.lastBpm+'/'+st.targetBpm+' BPM</span>';
      if(st.techRating)hwHtml+='<span style="font-size:11px;color:var(--accent4)">'+'★'.repeat(st.techRating)+'☆'.repeat(5-st.techRating)+'</span>';
      hwHtml+='</div>';
      if(st.targetBpm)hwHtml+='<div style="width:100%;height:5px;background:var(--surface2);border-radius:3px;margin-top:6px;overflow:hidden"><div style="width:'+st.pct+'%;height:100%;background:'+st.color+';border-radius:3px"></div></div>';
      // Practice button
      if(hw.pieceName){
        var pIdx=pieces.findIndex(function(x){return x.name===hw.pieceName;});
        if(pIdx>=0){
          var secIdx=0;
          if(hw.sectionName){
            var secs=pieces[pIdx].sections||[];
            for(var si=0;si<secs.length;si++){if(secs[si].name===hw.sectionName){secIdx=si;break;}}
          }
          hwHtml+='<button class="btn btn-xs btn-go mt8" onclick="startHomeworkPractice('+pIdx+','+secIdx+')" style="width:100%">▶ Jetzt üben</button>';
        }
      }
      hwHtml+='</div>';
    });
  }

  // Questions
  var qHtml='';
  (lesson.questions||[]).forEach(function(q,qi){
    qHtml+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><div style="flex:1;font-size:13px;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px">❓ '+esc(q.text)+'</div><button class="rm-btn" style="width:24px;height:24px;font-size:12px" onclick="removeQuestion('+qi+')">×</button></div>';
  });

  // Summary since last lesson
  var summaryHtml='';
  var sinceDate=lesson.lastLessonDate?new Date(lesson.lastLessonDate):null;
  if(sinceDate){
    var sinceSess=sessions.filter(function(s){return new Date(s.date)>=sinceDate;});
    var sinceMin=sinceSess.reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
    var sincePieces=new Set();
    sinceSess.forEach(function(s){(s.pieces||[]).forEach(function(sp){sincePieces.add(sp.name);});});
    summaryHtml='<div class="card"><div class="stitle">Seit letztem Unterricht</div><div style="display:flex;gap:12px;flex-wrap:wrap"><div style="text-align:center"><div style="font-family:\'DM Serif Display\',serif;font-size:20px;color:var(--accent)">'+sinceSess.length+'</div><div style="font-size:10px;color:var(--muted)">Sessions</div></div><div style="text-align:center"><div style="font-family:\'DM Serif Display\',serif;font-size:20px;color:var(--accent)">'+sinceMin+'</div><div style="font-size:10px;color:var(--muted)">Minuten</div></div><div style="text-align:center"><div style="font-family:\'DM Serif Display\',serif;font-size:20px;color:var(--accent)">'+sincePieces.size+'</div><div style="font-size:10px;color:var(--muted)">Stücke</div></div></div></div>';
  }

  el.innerHTML='<div class="stitle">Unterricht</div>'+
    countdownHtml+
    (lesson.nextDate?'<button class="btn btn-xs btn-s mb8" onclick="setLessonDate()" style="width:auto">📅 Datum ändern</button>':'')+
    '<div class="shdr mt12"><div class="stitle" style="margin:0">Hausaufgaben</div><button class="btn btn-xs btn-s" onclick="addHomework()">+ Aufgabe</button></div>'+
    (hwHtml||'<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px">Keine Hausaufgaben eingetragen.</div>')+
    ((lesson.homework||[]).length?function(){
      // Calculate recommendation
      var weekStart=getMonday();
      var weekMin=sessions.filter(function(s){return new Date(s.date)>=weekStart;}).reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
      var remaining=Math.max(0,settings.weeklyMin-weekMin);
      var today=new Date().getDay();
      var remainingDays=settings.days.filter(function(d){return d>=today;}).length;
      var recMin=remainingDays>0?Math.round(remaining/remainingDays):remaining;
      var recHtml=remaining>0?'<div style="font-size:11px;color:var(--accent);margin-bottom:8px">Empfehlung: ~'+recMin+' Min/Tag um Wochenziel zu schaffen (noch '+remaining+' Min in '+remainingDays+' Tagen)</div>':'<div style="font-size:11px;color:var(--success);margin-bottom:8px">✓ Wochenziel schon erreicht!</div>';
      return '<div class="card mt8" style="text-align:center">'+recHtml+'<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px"><span style="font-size:13px;font-weight:500">Heute verfügbar:</span><input type="number" id="uebeplan-minutes" value="'+(lesson.planMinutes||recMin||30)+'" min="10" max="180" style="width:70px;text-align:center;font-size:16px;font-weight:600" onchange="lesson.planMinutes=parseInt(this.value)||30;save()"><span style="font-size:13px;color:var(--muted)">Min</span></div><button class="btn btn-go" onclick="generateUebeplan()" style="font-size:15px;padding:14px">🤖 Übeplan für heute</button></div><div id="uebeplan-result">'+renderCachedUebeplan()+'</div>';
    }():'')+
    '<div class="shdr mt12"><div class="stitle" style="margin:0">Fragen an den Lehrer</div><button class="btn btn-xs btn-s" onclick="addQuestion()">+ Frage</button></div>'+
    (qHtml||'<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px">Keine Fragen.</div>')+
    summaryHtml+
    '<div class="card mt12"><div class="stitle">Lehrer-Feedback</div><textarea id="lesson-feedback" placeholder="Notizen vom Unterricht..." style="width:100%;min-height:80px;font-size:14px;padding:10px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;resize:vertical" onchange="lesson.feedback=this.value;save()">'+esc(lesson.feedback||'')+'</textarea></div>'+
    '<button class="btn btn-p mt12" onclick="finishLesson()">✓ Unterricht abschließen</button>';
}

function setLessonDate(){
  var el=document.getElementById('v-lesson');
  var current=lesson.nextDate?lesson.nextDate.slice(0,10):'';
  el.innerHTML='<div class="stitle">Unterricht</div><div class="card" style="text-align:center"><div style="font-size:13px;font-weight:600;margin-bottom:8px">📅 Nächster Unterricht</div><input type="date" id="lesson-date-input" value="'+(current||new Date().toISOString().slice(0,10))+'" style="font-size:16px;text-align:center;margin-bottom:12px"><div class="row" style="gap:8px"><button class="btn btn-go" onclick="saveLessonDate()" style="flex:1">Speichern</button><button class="btn btn-s" onclick="renderLesson()" style="flex:1">Abbrechen</button></div></div>';
}

function saveLessonDate(){
  var input=document.getElementById('lesson-date-input');
  if(input&&input.value){
    lesson.nextDate=input.value+'T12:00:00';
    save();
  }
  renderLesson();
}

function addHomework(){
  var el=document.getElementById('v-lesson');
  var pOptions=pieces.map(function(p,i){return '<div class="piece" onclick="selectHwPiece('+i+')" style="padding:10px 12px;margin-bottom:6px"><div class="piece-name">'+esc(p.name)+'</div><div class="piece-cat">'+esc(p.cat)+(p.sections&&p.sections.length>1?' · '+p.sections.length+' Takte':'')+'</div></div>';}).join('');
  el.innerHTML='<div class="stitle">Hausaufgabe hinzufügen</div>'+
    '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Stück wählen</div>'+
    '<div style="max-height:50vh;overflow-y:auto">'+pOptions+'</div>'+
    '<div class="mt12"><button class="btn btn-s" onclick="renderLesson()">← Abbrechen</button></div>';
}

function selectHwPiece(pIdx){
  var p=pieces[pIdx];if(!p)return;
  var el=document.getElementById('v-lesson');
  var secs=p.sections||[];
  
  if(secs.length>1){
    // Show section picker
    var secOptions=secs.map(function(s,i){
      var last=getSecLast(p.name,s.name);
      return '<div class="piece" onclick="selectHwSection('+pIdx+','+i+')" style="padding:10px 12px;margin-bottom:6px"><div class="piece-name" style="font-size:13px">'+esc(s.name)+'</div><div style="font-size:11px;color:var(--muted)">'+(last?last+'/':'')+s.targetBpm+' BPM</div></div>';
    }).join('');
    secOptions+='<div class="piece" onclick="selectHwSection('+pIdx+',-1)" style="padding:10px 12px;margin-bottom:6px"><div class="piece-name" style="font-size:13px">Ganzes Stück</div></div>';
    el.innerHTML='<div class="stitle">Takt-Bereich wählen</div><div style="font-size:13px;font-weight:600;margin-bottom:8px">'+esc(p.name)+'</div>'+secOptions+'<div class="mt12"><button class="btn btn-s" onclick="addHomework()">← Zurück</button></div>';
  }else{
    selectHwSection(pIdx,secs.length?0:-1);
  }
}

function selectHwSection(pIdx,sIdx){
  var p=pieces[pIdx];if(!p)return;
  var sec=sIdx>=0?(p.sections||[])[sIdx]:null;
  var el=document.getElementById('v-lesson');
  
  el.innerHTML='<div class="stitle">Aufgabe beschreiben</div>'+
    '<div style="font-size:13px;font-weight:600;margin-bottom:4px">'+esc(p.name)+(sec?' · '+esc(sec.name):'')+'</div>'+
    '<input type="text" id="hw-target-text" placeholder="Ziel beschreiben (z.B. sauber spielen, auswendig)" class="mb8">'+
    (sec?'<input type="number" id="hw-target-bpm" placeholder="Ziel-BPM (optional)" class="mb12">':'')+
    '<button class="btn btn-go" onclick="saveHomework('+pIdx+','+sIdx+')">✓ Hinzufügen</button>'+
    '<button class="btn btn-s mt8" onclick="addHomework()">← Zurück</button>';
}

function saveHomework(pIdx,sIdx){
  var p=pieces[pIdx];if(!p)return;
  var sec=sIdx>=0?(p.sections||[])[sIdx]:null;
  var targetText=document.getElementById('hw-target-text');
  var targetBpm=document.getElementById('hw-target-bpm');
  
  lesson.homework.push({
    id:Date.now(),
    pieceName:p.name,
    sectionName:sec?sec.name:null,
    targetBpm:targetBpm?parseInt(targetBpm.value)||0:0,
    targetText:targetText?targetText.value.trim():''
  });
  save();renderLesson();
}

function removeHomework(idx){
  lesson.homework.splice(idx,1);
  save();renderLesson();
}

function addQuestion(){
  var el=document.getElementById('v-lesson');
  el.innerHTML='<div class="stitle">Frage hinzufügen</div>'+
    '<input type="text" id="question-input" placeholder="Frage an den Lehrer..." class="mb12" style="font-size:16px">'+
    '<button class="btn btn-go" onclick="saveQuestion()">✓ Hinzufügen</button>'+
    '<button class="btn btn-s mt8" onclick="renderLesson()">← Abbrechen</button>';
  setTimeout(function(){var inp=document.getElementById('question-input');if(inp)inp.focus();},100);
}

function saveQuestion(){
  var input=document.getElementById('question-input');
  if(input&&input.value.trim()){
    lesson.questions.push({id:Date.now(),text:input.value.trim()});
    save();
  }
  renderLesson();
}

function removeQuestion(idx){
  lesson.questions.splice(idx,1);
  save();renderLesson();
}

function finishLesson(){
  if(!confirm('Unterricht abschließen? Hausaufgaben und Fragen werden zurückgesetzt.'))return;
  lesson.lastLessonDate=new Date().toISOString();
  lesson.homework=[];
  lesson.questions=[];
  lesson.feedback='';
  lesson.nextDate=null;
  save();renderLesson();
}

function startHomeworkPractice(pIdx,secIdx){
  var p=pieces[pIdx];if(!p)return;
  if(!sessionStart){sessionStart=Date.now();sessionTotalElapsed=0;}
  startPracticePiece(p.id,'ueben',secIdx);
}

// Lesson card for home page
function buildLessonCard(){
  if(!lesson.nextDate&&!(lesson.homework||[]).length)return '';
  var hw=lesson.homework||[];
  if(!hw.length&&!lesson.nextDate)return '';
  
  var countdownText='';
  if(lesson.nextDate){
    var next=new Date(lesson.nextDate);
    var diffDays=Math.ceil((next.getTime()-Date.now())/86400000);
    countdownText=diffDays===0?'Heute!':diffDays===1?'Morgen':'in '+diffDays+' Tagen';
  }
  
  var doneCount=0,totalCount=hw.length,hangCount=0;
  hw.forEach(function(h){
    if(!h.pieceName){return;}
    var sinceDate=lesson.lastLessonDate?new Date(lesson.lastLessonDate):new Date(0);
    var pSess=sessions.filter(function(s){return new Date(s.date)>=sinceDate&&(s.pieces||[]).some(function(sp){return sp.name===h.pieceName;});});
    if(h.sectionName){
      var last=getSecLast(h.pieceName,h.sectionName);
      var tgt=h.targetBpm||0;
      if(tgt&&last&&last>=tgt)doneCount++;
      else if(!pSess.length)hangCount++;
    }else{
      if(pSess.length)doneCount++;
      else hangCount++;
    }
    var pr=isPerformanceReady(h.pieceName);
    if(pr.ready)doneCount=Math.min(doneCount+1,totalCount);
  });
  var pct=totalCount?Math.round(doneCount/totalCount*100):0;
  
  return '<div class="card" onclick="nav(\'lesson\')" style="cursor:pointer">'+ 
    '<div style="display:flex;justify-content:space-between;align-items:center"><div class="stitle" style="margin:0">🎓 Unterricht'+(countdownText?' '+countdownText:'')+'</div><span style="font-size:14px;color:var(--muted)">→</span></div>'+
    (totalCount?'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:12px"><span>'+doneCount+'/'+totalCount+' Hausaufgaben</span>'+(hangCount?'<span style="color:var(--danger);font-weight:600">'+hangCount+' offen 🔴</span>':doneCount>=totalCount?'<span style="color:var(--success);font-weight:600">Alles erledigt 👍</span>':'<span style="color:var(--accent);font-weight:600">'+(totalCount-doneCount)+' in Arbeit</span>')+'</div><div style="width:100%;height:6px;background:var(--surface2);border-radius:3px;margin-top:4px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+(pct>=100?'var(--success)':'var(--accent)')+';border-radius:3px"></div></div>':'')+
    '</div>';
}

// === CLAUDE ANALYSIS ===
var analysisCache=JSON.parse(localStorage.getItem("uz-analysis")||'{}');

function getAnalysisCache(pieceName){return analysisCache[pieceName]||null;}

function renderCachedAnalysis(pieceName){
  var cached=getAnalysisCache(pieceName);
  if(!cached)return '';
  var d=new Date(cached.date);
  var dateStr=d.toLocaleDateString('de-DE',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  return '<div style="padding:12px;background:var(--surface);border:1px solid var(--accent2);border-radius:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-size:12px;font-weight:600;color:var(--accent2)">🤖 Claude-Analyse</div><div style="font-size:10px;color:var(--muted)">'+dateStr+'</div></div><div style="font-size:13px;line-height:1.5;color:var(--text)">'+esc(cached.text).replace(/\n/g,'<br>')+'</div></div>';
}

function analyzePiece(pieceName){
  var p=pieces.find(function(x){return x.name===pieceName;});
  if(!p)return;
  var pid=p.id;
  var el=document.getElementById('analysis-'+pid);
  if(!el)return;
  el.innerHTML='<div style="padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;text-align:center"><div style="font-size:14px;margin-bottom:4px">🤖 Analysiere...</div><div style="font-size:12px;color:var(--muted)">Claude denkt nach...</div></div>';

  // Gather all data for this piece
  var secs=p.sections||[];
  var secsData=secs.map(function(s){
    var hist=getSecHist(p.name,s.name);
    var last=hist.length?hist[hist.length-1].bpm:0;
    return {name:s.name,startBpm:s.startBpm||0,targetBpm:s.targetBpm||0,currentBpm:last,entries:hist.length};
  });

  // Gather all session data for this piece
  var pieceSessions=[];
  sessions.forEach(function(s){
    (s.pieces||[]).forEach(function(sp){
      if(sp.name===pieceName){
        pieceSessions.push({
          date:s.date,
          mode:sp.mode||'ueben',
          section:sp.section||null,
          totalSec:sp.totalSec,
          techRating:sp.techRating||0,
          exprRating:sp.exprRating||0,
          overallRating:sp.overallRating||0,
          flowRating:sp.flowRating||0,
          errorFree:sp.errorFree!=null?sp.errorFree:null,
          maxBpm:sp.rounds&&sp.rounds.length?Math.max.apply(null,sp.rounds.map(function(r){return r.bpm;})):0
        });
      }
    });
  });

  var pr=isPerformanceReady(pieceName);

  var prompt='Du bist ein erfahrener Musiklehrer und Übe-Coach. Analysiere die folgenden Daten eines Gitarrenschülers für das Stück "'+pieceName+'" und gib eine kurze, konkrete Handlungsempfehlung auf Deutsch. Maximal 4-5 Sätze. Sei direkt und motivierend.\n\n';
  prompt+='Stück: '+pieceName+'\n';
  prompt+='Kategorie: '+p.cat+'\n';
  prompt+='Notiz: '+(p.note||'keine')+'\n\n';
  prompt+='Takt-Bereiche:\n';
  secsData.forEach(function(s){
    prompt+='- '+s.name+': Start '+s.startBpm+' → Ziel '+s.targetBpm+' BPM, aktuell '+(s.currentBpm||'noch nicht geübt')+' ('+s.entries+' Einträge)\n';
  });
  prompt+='\nAuftrittssicher: '+(pr.ready?'Ja ('+pr.streak+'x fehlerfrei)':'Nein ('+pr.streak+'/3 fehlerfrei)')+'\n';
  prompt+='\nLetzte Sessions (neueste zuerst, max 10):\n';
  var recent=pieceSessions.slice(-10).reverse();
  recent.forEach(function(s){
    var d=new Date(s.date).toLocaleDateString('de-DE',{day:'numeric',month:'short'});
    prompt+='- '+d+' | '+(s.mode==='spielen'?'Spielen':'Üben'+(s.section?' ('+s.section+')':''));
    if(s.mode==='spielen'){
      prompt+=' | Fehlerfrei: '+(s.errorFree===true?'Ja':s.errorFree===false?'Nein':'–');
      prompt+=' | Gesamt:'+s.overallRating+' Flow:'+s.flowRating+' Ausdruck:'+s.exprRating;
    }else{
      prompt+=' | '+s.maxBpm+' BPM | Technik:'+s.techRating+' Ausdruck:'+s.exprRating;
    }
    prompt+=' | '+Math.round(s.totalSec/60)+' Min\n';
  });

  // Call Claude API
  var apiKey=settings.apiKey||'';
  if(!apiKey){
    el.innerHTML='<div style="padding:12px;background:var(--surface);border:1px solid var(--accent);border-radius:10px;font-size:12px;color:var(--accent)">⚠ Kein API-Key eingetragen. Gehe zu ⚙ Einstellungen → Claude AI Analyse.</div>';
    return;
  }
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:500,
      messages:[{role:'user',content:prompt}]
    })
  }).then(function(r){return r.json();}).then(function(data){
    var text='';
    if(data.content&&data.content.length){
      data.content.forEach(function(c){if(c.type==='text')text+=c.text;});
    }
    if(data.error){text='Fehler: '+(data.error.message||'Unbekannt');}
    if(!text)text='Keine Analyse verfügbar.';
    // Cache the result
    if(!data.error){
      analysisCache[pieceName]={text:text,date:new Date().toISOString()};
      localStorage.setItem("uz-analysis",JSON.stringify(analysisCache));
    }
    var dateStr=new Date().toLocaleDateString('de-DE',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    el.innerHTML='<div style="padding:12px;background:var(--surface);border:1px solid var(--accent2);border-radius:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-size:12px;font-weight:600;color:var(--accent2)">🤖 Claude-Analyse</div><div style="font-size:10px;color:var(--muted)">'+dateStr+'</div></div><div style="font-size:13px;line-height:1.5;color:var(--text)">'+esc(text).replace(/\n/g,'<br>')+'</div></div>';
  }).catch(function(err){
    el.innerHTML='<div style="padding:12px;background:var(--surface);border:1px solid var(--danger);border-radius:10px;font-size:12px;color:var(--danger)">Analyse fehlgeschlagen: '+esc(err.message||'Netzwerkfehler')+'</div>';
  });
}

// === ÜBEPLAN ===
function renderCachedUebeplan(){
  var cached=null;
  try{cached=JSON.parse(localStorage.getItem('uz-uebeplan'));}catch(e){}
  if(!cached||!cached.text)return '';
  var d=new Date(cached.date);
  var today=new Date();
  // Only show if from today
  if(d.toDateString()!==today.toDateString())return '';
  var dateStr=d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  return '<div style="padding:14px;background:var(--surface);border:2px solid var(--accent2);border-radius:12px;margin-top:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:var(--accent2)">🤖 Dein Übeplan</div><div style="font-size:10px;color:var(--muted)">'+dateStr+'</div></div><div style="font-size:14px;line-height:1.6;color:var(--text)">'+esc(cached.text).replace(/\n/g,'<br>')+'</div></div>';
}

function generateUebeplan(){
  var el=document.getElementById('uebeplan-result');
  if(!el)return;
  
  var apiKey=settings.apiKey||'';
  if(!apiKey){
    el.innerHTML='<div style="padding:12px;background:var(--surface);border:1px solid var(--accent);border-radius:10px;font-size:12px;color:var(--accent)">⚠ Kein API-Key eingetragen. Gehe zu ⚙ Einstellungen → Claude AI Analyse.</div>';
    return;
  }
  
  el.innerHTML='<div style="padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-align:center"><div style="font-size:16px;margin-bottom:4px">🤖</div><div style="font-size:13px;color:var(--muted)">Erstelle deinen Übeplan...</div></div>';

  // Build comprehensive context
  var availMin=document.getElementById('uebeplan-minutes');
  var minutes=availMin?parseInt(availMin.value)||30:lesson.planMinutes||30;
  var prompt='Du bist ein erfahrener Gitarrenlehrer und Übe-Coach. Erstelle einen konkreten Übeplan für HEUTE auf Deutsch. Der Schüler hat '+minutes+' Minuten Zeit. Sei direkt, motivierend und spezifisch. Nenne konkrete Tempi, Stücke und Takte. Die Zeitangaben müssen in Summe '+minutes+' Minuten ergeben. Maximal 8-10 Sätze.\n\n';
  
  // Lesson info
  if(lesson.nextDate){
    var next=new Date(lesson.nextDate);
    var diffDays=Math.ceil((next.getTime()-Date.now())/86400000);
    prompt+='Nächster Unterricht: '+(diffDays===0?'HEUTE!':diffDays===1?'MORGEN':'in '+diffDays+' Tagen')+'\n\n';
  }
  
  // Homework
  prompt+='Hausaufgaben:\n';
  var hw=lesson.homework||[];
  if(!hw.length)prompt+='Keine spezifischen Hausaufgaben.\n';
  hw.forEach(function(h){
    prompt+='- '+(h.pieceName||'Aufgabe')+' '+(h.sectionName||'')+(h.targetText?' → '+h.targetText:'');
    if(h.targetBpm)prompt+=' (Ziel: '+h.targetBpm+' BPM)';
    if(h.pieceName){
      var last=h.sectionName?getSecLast(h.pieceName,h.sectionName):0;
      if(last)prompt+=' [Aktuell: '+last+' BPM]';
      var sinceDate=lesson.lastLessonDate?new Date(lesson.lastLessonDate):new Date(0);
      var sessCount=sessions.filter(function(s){return new Date(s.date)>=sinceDate&&(s.pieces||[]).some(function(sp){return sp.name===h.pieceName;});}).length;
      prompt+=' ['+sessCount+'× geübt seit letztem Unterricht]';
      var pr=isPerformanceReady(h.pieceName);
      if(pr.ready)prompt+=' [Auftrittssicher ✓]';
      else if(pr.total>0)prompt+=' ['+pr.streak+'/3 fehlerfrei]';
    }
    prompt+='\n';
  });
  
  // All pieces overview
  prompt+='\nAlle Stücke:\n';
  pieces.forEach(function(p){
    var secs=p.sections||[];
    prompt+='- '+p.name+' ('+p.cat+')';
    secs.forEach(function(s){
      var last=getSecLast(p.name,s.name);
      if(s.targetBpm)prompt+=' | '+s.name+': '+(last||'–')+'/'+s.targetBpm+' BPM';
    });
    var pr=isPerformanceReady(p.name);
    if(pr.ready)prompt+=' [Auftrittssicher]';
    // Days since last practice
    var lastSess=sessions.filter(function(s){return(s.pieces||[]).some(function(sp){return sp.name===p.name;});});
    if(lastSess.length){
      var daysSince=Math.floor((Date.now()-new Date(lastSess[lastSess.length-1].date).getTime())/86400000);
      prompt+=' [Vor '+daysSince+'d geübt]';
    }else{
      prompt+=' [Nie geübt]';
    }
    prompt+='\n';
  });
  
  // This week stats
  var weekStart=getMonday();
  var weekSess=sessions.filter(function(s){return new Date(s.date)>=weekStart;});
  var weekMin=weekSess.reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  prompt+='\nDiese Woche: '+weekMin+' Min geübt (Ziel: '+settings.weeklyMin+' Min), '+weekSess.length+' Sessions\n';
  prompt+='Wochenziel: '+settings.weeklyMin+' Minuten\n';
  
  // Today's practice
  var todayStart=new Date();todayStart.setHours(0,0,0,0);
  var todaySess=sessions.filter(function(s){return new Date(s.date)>=todayStart;});
  var todayMin=todaySess.reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  if(todayMin>0){
    prompt+='\nHeute schon geübt: '+todayMin+' Min\n';
    var todayPieces=[];
    todaySess.forEach(function(s){(s.pieces||[]).forEach(function(sp){if(todayPieces.indexOf(sp.name)===-1)todayPieces.push(sp.name);});});
    prompt+='Heute geübte Stücke: '+todayPieces.join(', ')+'\n';
  }
  
  prompt+='\nErstelle einen konkreten Übeplan für heute mit Zeitangaben pro Stück/Abschnitt. Priorisiere Hausaufgaben die noch nicht erledigt sind. Berücksichtige was heute schon geübt wurde.';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:800,
      messages:[{role:'user',content:prompt}]
    })
  }).then(function(r){return r.json();}).then(function(data){
    var text='';
    if(data.content&&data.content.length){
      data.content.forEach(function(c){if(c.type==='text')text+=c.text;});
    }
    if(data.error){text='Fehler: '+(data.error.message||'Unbekannt');}
    if(!text)text='Kein Übeplan verfügbar.';
    // Cache
    if(!data.error){
      localStorage.setItem('uz-uebeplan',JSON.stringify({text:text,date:new Date().toISOString()}));
    }
    var dateStr=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    el.innerHTML='<div style="padding:14px;background:var(--surface);border:2px solid var(--accent2);border-radius:12px;margin-top:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:var(--accent2)">🤖 Dein Übeplan</div><div style="font-size:10px;color:var(--muted)">'+dateStr+'</div></div><div style="font-size:14px;line-height:1.6;color:var(--text)">'+esc(text).replace(/\n/g,'<br>')+'</div></div>';
  }).catch(function(err){
    el.innerHTML='<div style="padding:12px;background:var(--surface);border:1px solid var(--danger);border-radius:10px;font-size:12px;color:var(--danger)">Übeplan fehlgeschlagen: '+esc(err.message||'Netzwerkfehler')+'</div>';
  });
}

// === INIT ===
// Recover pending session if app was closed during practice
(function(){
  var pending=localStorage.getItem("uz-pending");
  if(pending){
    try{
      var pendingLog=JSON.parse(pending);
      if(pendingLog&&pendingLog.length){
        if(confirm("Du hast eine nicht gespeicherte Session ("+pendingLog.length+" Stücke). Jetzt speichern?")){
          var totalSec=pendingLog.reduce(function(a,e){return a+(e.totalSec||0);},0);
          sessions.push({
            date:new Date().toISOString(),
            totalSec:totalSec,
            pieces:pendingLog.map(function(e){return {
              name:e.pieceName,section:e.section||null,mode:e.mode||'ueben',
              rounds:e.rounds||[],totalSec:e.totalSec||0,
              techRating:e.techRating||0,exprRating:e.exprRating||0,
              overallRating:e.overallRating||0,flowRating:e.flowRating||0,
              errorFree:e.errorFree!=null?e.errorFree:null
            };}),
            reflection:{}
          });
        }
        localStorage.removeItem("uz-pending");
        save();
      }
    }catch(e){localStorage.removeItem("uz-pending");}
  }
})();
renderHome();
</script>
